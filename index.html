<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spine Animation Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-rgb: 30, 30, 30;
            --fg-rgb: 255, 255, 255;
            --bg: rgb(var(--bg-rgb));
            --fg: rgb(var(--fg-rgb));
            --n1: rgba(var(--fg-rgb), 0.08);
            --n2: rgba(var(--fg-rgb), 0.14);
            --n3: rgba(var(--fg-rgb), 0.20);
            --n4: rgba(var(--fg-rgb), 0.30);
            --n5: rgba(var(--fg-rgb), 0.42);
            --n-text: rgba(var(--fg-rgb), 0.62);
            --n-text-dim: rgba(var(--fg-rgb), 0.40);
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg);
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .left-panel {
            width: 300px;
            background-color: var(--bg);
            color: var(--fg);
            display: flex;
            flex-direction: column;
            padding: 10px;
            border-right: 1px solid var(--n2);
            min-width: 0;
            height: 100vh;
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: var(--n4) transparent;
        }

        .left-panel::-webkit-scrollbar {
            width: 8px;
        }

        .left-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .left-panel::-webkit-scrollbar-thumb {
            background-color: var(--n4);
            border-radius: 4px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .left-panel::-webkit-scrollbar-thumb:hover {
            background-color: var(--n-text);
        }

        .resize-handle {
            width: 20px;
            height: 100%;
            cursor: col-resize;
            background-color: var(--n1);
            border-right: 1px solid var(--n2);
            position: relative;
            z-index: 10;
        }

        .resize-handle:hover {
            background-color: var(--n3);
        }

        .resize-handle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 30px;
            background-color: var(--n4);
            border-radius: 1px;
        }

        .left-panel h2 {
            font-size: 16px;
            font-weight: bold;
            color: var(--n-text);
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--n2);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .tab {
            font-size: 14px;
            font-weight: bold;
            padding: 8px 12px;
            cursor: pointer;
            color: var(--n-text);
            user-select: none;
            border-radius: 4px;
        }

        .tab:hover {
            color: var(--fg);
            background-color: var(--n2);
        }

        .tab.active {
            color: var(--fg);
            background-color: var(--n3);
        }

        .tab.inactive {
            color: var(--n-text-dim);
        }

        .tab-content-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .tab-content {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .tab-content.active {
            display: flex;
        }

        .playlist-input {
            width: 100%;
            height: 100%;
            background-color: var(--n1);
            color: var(--fg);
            border: 1px solid var(--n2);
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            outline: none;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .playlist-input:focus {
            border-color: var(--n4);
        }

        .playlist-input div {
            min-height: 1.2em;
        }

        .menu-section {
            padding-top: 10px;
            border-top: 1px solid var(--n2);
        }

        .slider-container {
            margin-bottom: 15px;
        }

        .theme-container {
            margin-top: 10px;
        }

        .slider-label {
            font-size: 12px;
            color: var(--n-text);
            margin-bottom: 5px;
            display: block;
        }

        .slider {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            outline: none;
        }

        .slider::-webkit-slider-runnable-track {
            height: 4px;
            background: var(--n4);
            border-radius: 2px;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 16px;
            width: 16px;
            background: var(--n-text);
            border-radius: 50%;
            margin-top: -6px;
            cursor: pointer;
            border: 2px solid var(--bg);
        }

        .slider::-moz-range-track {
            height: 4px;
            background: var(--n4);
            border-radius: 2px;
        }

        .slider::-moz-range-thumb {
            height: 16px;
            width: 16px;
            background: var(--n-text);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid var(--bg);
        }

        .slider:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .checkbox-item input[type="checkbox"] {
            margin-right: 8px;
            accent-color: var(--n-text);
            transform: scale(1.2);
        }

        .checkbox-item label {
            font-size: 12px;
            color: var(--n-text);
            cursor: pointer;
        }

        button {
            background: var(--n3);
            color: var(--fg);
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
            width: 100%;
        }

        button:hover {
            background: var(--n4);
        }

        button:active {
            background: var(--n5);
        }

        .slider-value {
            font-size: 12px;
            color: var(--n-text);
            text-align: right;
            margin-top: 2px;
        }

        .scale-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .scale-row .slider-label {
            margin-bottom: 0;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .scale-row .slider {
            flex: 1;
            min-width: 0;
        }

        .scale-row button {
            width: auto;
            padding: 6px 12px;
            margin: 0;
            flex-shrink: 0;
        }

        .theme-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .theme-row .slider-label {
            margin-bottom: 0;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .theme-row .slider {
            flex: 1;
            min-width: 0;
        }

        .skin-section {
            margin-bottom: 15px;
            display: none;
        }

        .skin-section.visible {
            display: block;
        }

        .museum-section {
            margin-bottom: 5px;
            display: none;
        }

        .museum-section.visible {
            display: block;
        }

        .selected-name-input {
            width: 100%;
            background: var(--n1);
            border: 1px solid var(--n2);
            border-radius: 4px;
            padding: 6px 8px;
            color: var(--fg);
            font-size: 12px;
            outline: none;
            margin-bottom: 5px;
            box-sizing: border-box;
        }

        .selected-name-input:focus {
            border-color: var(--n4);
        }

        .coord-row {
            display: flex;
            gap: 8px;
        }

        .coord-field {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .coord-label {
            font-size: 12px;
            color: var(--n-text);
            flex-shrink: 0;
        }

        .coord-input {
            width: 100%;
            background: var(--n1);
            border: 1px solid var(--n2);
            border-radius: 4px;
            padding: 6px 8px;
            color: var(--fg);
            font-size: 12px;
            outline: none;
            font-family: monospace;
            min-width: 0;
        }

        .coord-input:focus {
            border-color: var(--n4);
        }

        .skin-select {
            width: 100%;
            background-color: var(--n1);
            color: var(--fg);
            border: 1px solid var(--n2);
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        .skin-select:focus {
            border-color: var(--n4);
        }

        .skin-select option {
            background-color: var(--bg);
            color: var(--fg);
        }

        .right-area {
            flex: 1;
            position: relative;
            background-color: var(--bg);
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .right-area.museum-mode {
            display: block;
        }

        .right-area.museum-mode .canvas-container {
            height: 100vh;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;
            overflow: hidden;
        }

        .upload-section {
            margin-bottom: 15px;
            display: flex;
            gap: 5px;
        }

        .upload-btn {
            background: var(--n1);
            color: var(--n-text);
            border: 2px dashed var(--n3);
            padding: 12px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            flex: 1;
            font-weight: bold;
        }

        .upload-btn:hover {
            background: var(--n2);
            border-color: var(--n4);
            color: var(--fg);
        }

        .drop-zone {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .drop-zone.active {
            display: flex;
        }

        .drop-zone-inner {
            border: 3px dashed #888;
            border-radius: 15px;
            padding: 40px 60px;
            text-align: center;
        }

        .drop-zone-title {
            font-size: 18px;
            color: #ddd;
            margin-bottom: 8px;
        }

        .drop-zone-hint {
            font-size: 12px;
            color: #888;
        }

        .loading-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 90;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-text {
            color: #ddd;
            font-size: 16px;
        }

        .animations-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--n4) transparent;
        }

        .animations-list::-webkit-scrollbar {
            width: 6px;
        }

        .animations-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .animations-list::-webkit-scrollbar-thumb {
            background-color: var(--n4);
            border-radius: 3px;
        }

        .animation-item {
            padding: 4px 8px;
            color: var(--n-text-dim);
            cursor: pointer;
            font-size: 12px;
            border-radius: 3px;
            font-family: monospace;
        }

        .animation-item:hover {
            background-color: var(--n2);
            color: var(--n-text);
        }

        .animation-item.active {
            color: var(--fg);
        }

        .error-block {
            display: none;
            position: relative;
            background-color: var(--n1);
            color: rgb(var(--error-fg));
            border: 1px solid rgba(var(--error-fg), 0.5);
            border-radius: 4px;
            padding: 8px 72px 8px 8px;
            font-size: 11px;
            font-family: monospace;
            line-height: 1.4;
            max-height: 120px;
            overflow-y: auto;
            margin-bottom: 10px;
            white-space: pre-wrap;
            scrollbar-width: thin;
            scrollbar-color: var(--n4) transparent;
        }

        .error-block::-webkit-scrollbar {
            width: 5px;
        }

        .error-block::-webkit-scrollbar-track {
            background: transparent;
        }

        .error-block::-webkit-scrollbar-thumb {
            background-color: var(--n4);
            border-radius: 3px;
        }

        .error-block.visible {
            display: block;
        }

        .error-block-close {
            position: absolute;
            top: 4px;
            right: 6px;
            background: none;
            border: none;
            color: rgb(var(--error-fg));
            cursor: pointer;
            font-size: 13px;
            line-height: 1;
            padding: 0;
            width: auto;
            margin: 0;
        }

        .error-block-close:hover {
            color: rgb(var(--error-fg-hover));
        }

        .error-block-copy {
            position: absolute;
            top: 4px;
            right: 28px;
            background: none;
            border: none;
            color: rgb(var(--error-fg));
            cursor: pointer;
            font-size: 11px;
            font-family: monospace;
            line-height: 1;
            padding: 0;
            margin: 0;
        }

        .error-block-copy:hover {
            color: rgb(var(--error-fg-hover));
        }

        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        .scenario-timeline {
            display: none;
            height: 28px;
            background: var(--bg);
            padding: 0 12px;
            align-items: center;
            border-top: 1px solid var(--n2);
        }

        .scenario-timeline.visible {
            display: flex;
        }

        .player-bar {
            display: flex;
            align-items: center;
            height: 40px;
            background: var(--bg);
            padding: 0 8px;
            gap: 4px;
            border-top: 1px solid var(--n2);
        }

        .player-buttons {
            display: flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }

        .player-btn {
            width: 32px;
            height: 32px;
            background: none;
            border: 1px solid transparent;
            cursor: pointer;
            color: var(--n-text-dim);
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            margin: 0;
            box-sizing: border-box;
            font-size: inherit;
            font-weight: inherit;
        }

        .player-btn:hover {
            background: var(--n2);
            color: var(--n-text);
        }

        .player-btn:active {
            background: var(--n3);
        }

        .player-btn.toggle-btn.active {
            color: var(--fg);
            background: var(--n2);
            border-color: var(--n3);
        }

        .player-btn svg {
            width: 100%;
            height: 100%;
        }

        .player-slider-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .player-slider {
            width: 100%;
            height: 28px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            outline: none;
        }

        .player-slider::-webkit-slider-runnable-track {
            height: 4px;
            background: var(--n3);
            border-radius: 2px;
        }

        .player-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 14px;
            width: 14px;
            background: var(--n-text);
            border-radius: 50%;
            margin-top: -5px;
            cursor: pointer;
            border: 2px solid var(--bg);
        }

        .player-slider::-moz-range-track {
            height: 4px;
            background: var(--n3);
            border-radius: 2px;
        }

        .player-slider::-moz-range-thumb {
            height: 14px;
            width: 14px;
            background: var(--n-text);
            border-radius: 50%;
            border: 2px solid var(--bg);
            cursor: pointer;
        }

        .info-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        .info-overlay.visible {
            display: block;
        }

        .info-skeleton-name {
            position: absolute;
            top: 10px;
            left: 10px;
            color: var(--fg);
            font-size: 20px;
            font-family: Arial, sans-serif;
            text-shadow: 1px 1px 3px rgba(var(--bg-rgb), 0.85);
        }

        .info-animation-name {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: var(--fg);
            font-size: 20px;
            font-family: Arial, sans-serif;
            text-shadow: 1px 1px 3px rgba(var(--bg-rgb), 0.85);
        }

            .info-animation-duration {
            opacity: 0.5;
        }

        .museum-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--n4) transparent;
        }

        .museum-list::-webkit-scrollbar {
            width: 6px;
        }

        .museum-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .museum-list::-webkit-scrollbar-thumb {
            background-color: var(--n4);
            border-radius: 3px;
        }

        .museum-item {
            display: flex;
            align-items: center;
            padding: 1px 4px;
            border-radius: 3px;
            gap: 6px;
            user-select: none;
            font-family: monospace;
            font-size: 12px;
        }

        .museum-item:hover {
            background-color: var(--n1);
        }

        .museum-item.dragging {
            opacity: 0.5;
        }

        .museum-item.drag-over {
            border-top: 2px solid var(--n4);
        }

        .museum-item.selected {
            background-color: var(--n2);
            color: var(--fg);
        }

        .museum-item.selected .museum-name {
            color: var(--fg);
        }

        .museum-drag-handle {
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--n-text-dim);
            font-size: 12px;
            flex-shrink: 0;
        }

        .museum-drag-handle:hover {
            color: var(--n-text);
        }

        .museum-drag-handle:active {
            cursor: grabbing;
        }

        .museum-visibility-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--n-text-dim);
            font-size: 14px;
            padding: 2px 2px;
            margin: 0;
            width: auto;
            flex-shrink: 0;
            font-family: inherit;
            font-weight: inherit;
            line-height: 1;
        }

        .museum-visibility-btn:hover {
            color: var(--n-text);
        }

        .museum-visibility-btn.visible {
            color: var(--fg);
        }

        .museum-name {
            flex: 1;
            font-size: 12px;
            color: var(--n-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            cursor: pointer;
        }

        .museum-animation-dropdown {
            position: relative;
            width: 100%;
        }

        .museum-animation-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            padding: 4px 6px;
            background: var(--n1);
            border: 1px solid var(--n2);
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            color: var(--n-text);
            height: 24px;
            box-sizing: border-box;
        }

        .museum-animation-trigger:hover {
            background: var(--n2);
            border-color: var(--n3);
            color: var(--n-text);
        }

        .museum-animation-trigger .arrow {
            font-size: 8px;
            transition: transform 0.2s;
        }

        .museum-animation-dropdown.open .museum-animation-trigger .arrow {
            transform: rotate(180deg);
        }

        .museum-animation-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg);
            border: 1px solid var(--n3);
            border-radius: 4px;
            margin-top: 2px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .museum-animation-dropdown.open .museum-animation-list {
            display: block;
        }

        .museum-animation-item {
            padding: 4px 8px;
            font-size: 11px;
            color: var(--n-text);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .museum-animation-item:hover {
            background: var(--n2);
            color: var(--n-text);
        }

        .museum-animation-item.active {
            background: var(--n3);
            color: var(--fg);
            font-weight: bold;
        }

        .museum-animation-item.active::before {
            content: '▶';
            margin-right: 4px;
        }

        .selected-animation-row {
            margin-top: 6px;
            margin-bottom: 6px;
        }

        .selected-controls {
            display: flex;
            gap: 4px;
        }

        .selected-controls .player-btn {
            width: 28px;
            height: 28px;
        }

        .selected-controls .player-btn.text-btn {
            width: auto;
            padding: 0 8px;
            font-size: 11px;
            font-weight: bold;
        }

        .selected-position-slider {
            flex: 1;
            min-width: 0;
        }

        .museum-controls {
            padding: 10px 0;
            border-top: 1px solid var(--n2);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .museum-position-io {
            display: flex;
            gap: 8px;
        }

        .museum-position-input {
            flex: 0 0 calc(50% - 4px);
            background: var(--n1);
            border: 1px solid var(--n2);
            border-radius: 4px;
            padding: 6px 8px;
            color: var(--fg);
            font-size: 11px;
            outline: none;
        }

        .museum-position-input:focus {
            border-color: var(--n4);
        }

        .museum-position-btn {
            background: var(--n3);
            color: var(--fg);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }

        .museum-position-btn:hover {
            background: var(--n4);
        }

        .center-diamond {
            position: absolute;
            width: 20px;
            height: 20px;
            transform: rotate(45deg);
            background: white;
            border: 2px solid black;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.2s;
        }

        .center-diamond.hovered {
            opacity: 0.5;
        }
    </style>
</head>
<body>

                    </button>

                        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="7" width="2.5" height="10"/><rect x="6.5" y="7" width="2.5" height="10"/><polygon points="12,12 18,7 18,17"/><rect x="18" y="11" width="4" height="2"/></svg>

    <script src="./lib/pixi.js"></script>
    <script src="./lib/spine-pixi-v8.js"></script>

    <script>
        (function() {
            (function earlyTheme() {
                let raw = null;
                try { raw = localStorage.getItem('spineViewerThemeLuminance'); } catch (e) {}
                const L = (raw === null || raw === undefined) ? 30 : Math.max(0, Math.min(255, parseInt(raw, 10) || 0));
                const fg = L < 128 ? 255 : 0;
                const rs = document.documentElement.style;
                rs.setProperty('--bg-rgb', L + ',' + L + ',' + L);
                rs.setProperty('--fg-rgb', fg + ',' + fg + ',' + fg);
                applyErrorColors(rs, L);
            })();

            function applyErrorColors(rs, L) {
                let e, eh;
                if (L < 128) {
                    e = '255, 215, 215';
                    eh = '255, 240, 240';
                } else {
                    e = '80, 24, 24';
                    eh = '50, 12, 12';
                }
                rs.setProperty('--error-fg', e);
                rs.setProperty('--error-fg-hover', eh);
            }

            function showError(message) {
                const block = document.getElementById('errorBlock');
                const text = document.getElementById('errorBlockText');
                text.textContent = message;
                block.classList.add('visible');
            }

            function hideError() {
                const block = document.getElementById('errorBlock');
                block.classList.remove('visible');
            }

            function showZeroAlphaIfAny() {
                if (!state.checkZeroAlpha) { hideError(); return; }
                if (state.hasLoadError || state.hasPlaylistError) return;
                if (state.zeroAlphaWarnings && state.zeroAlphaWarnings.length > 0) {
                    showError(state.zeroAlphaWarnings.join('\n'));
                } else {
                    hideError();
                }
            }

            const state = {
                app: null,
                currentSkeleton: null,
                currentSkeletonName: '',
                playlist: [],
                currentIndex: 0,
                redLineGraphics: null,
                isPlaying: false,
                skeletons: {},
                skeletonResolution: {},
                availableResolutions: {},
                isResizing: false,
                resizeStartX: 0,
                leftPanelStartWidth: 0,
                currentScale: 1.0,
                cameraX: 0,
                cameraY: 0,
                isDragging: false,
                dragStartX: 0,
                dragStartY: 0,
                skeletonStartX: 0,
                skeletonStartY: 0,
                loadedSkeletons: new Set(),
                sdMode: false,
                showPlaceholders: false,
                showInfo: true,
                activeMode: 'scenario',
                activeAnimation: null,
                availableAnimations: [],
                _lastScenarioText: '',
                _suppressScenarioInput: false,
                scenarioGeneration: 0,
                blobUrls: [],
                pixiTextures: [],
                hasLoadError: false,
                hasPlaylistError: false,
                zeroAlphaWarnings: [],
                checkZeroAlpha: false,
                availableSkins: {},
                selectedSkins: {},
                player: {
                    playing: true,
                    loop: true,
                    pauseBefore: false,
                    pauseAfter: false,
                    seeking: false,
                    seekType: null,
                    phase: 'none',
                    phaseElapsed: 0,
                    lastTickTime: 0,
                    pendingAction: null,
                    stallIndex: -1,
                    stallSince: 0
                },
                themeL: 30,
                themeFg: 255,
                museum: {
                    skeletons: [],
                    draggingSkeleton: null,
                    dragStartX: 0,
                    dragStartY: 0,
                    skeletonStartPositions: {},
                    hoveredSkeleton: null,
                    centerDiamondGraphics: null,
                    hoverLabelObjects: {},
                    cameraDragStart: false,
                    cameraStartX: 0,
                    cameraStartY: 0,
                    cameraOffsetX: 0,
                    cameraOffsetY: 0,
                    cameraScale: 1.0,
                    snapToGrid: true,
                    workspaceGraphics: null,
                    selectedSkeletons: [],
                    isSelecting: false,
                    selectionStartX: 0,
                    selectionStartY: 0,
                    selectionGraphics: null,
                    visibilityPainting: false,
                    visibilityPaintTarget: null
                }
            };

            function getScenarioPlainText() {
                const el = document.getElementById('playlist-input');
                let text = el.innerText || '';
                text = text.replace(/\u200B/g, '');
                if (text.endsWith('\n')) text = text.slice(0, -1);
                return text;
            }

            function escapeHtml(str) {
                return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            function setScenarioContent(text, activeIndex) {
                const el = document.getElementById('playlist-input');
                const lines = text.split('\n');
                let html = '';
                for (let i = 0; i < lines.length; i++) {
                    const lineText = lines[i] || '';
                    const color = (i === activeIndex) ? 'var(--fg)' : 'rgba(var(--fg-rgb), 0.45)';
                    const escaped = escapeHtml(lineText);
                    if (escaped === '') {
                        html += '<div style="color:' + color + '">\u200B</div>';
                    } else {
                        html += '<div style="color:' + color + '">' + escaped + '</div>';
                    }
                }
                state._suppressScenarioInput = true;
                el.innerHTML = html;
                state._suppressScenarioInput = false;
            }

            function saveCursorPosition(el) {
                const sel = window.getSelection();
                if (sel.rangeCount === 0) return -1;
                const range = sel.getRangeAt(0);
                const preRange = range.cloneRange();
                preRange.selectNodeContents(el);
                preRange.setEnd(range.startContainer, range.startOffset);
                return preRange.toString().length;
            }

            function restoreCursorPosition(el, pos) {
                if (pos < 0) return;
                const range = document.createRange();
                const sel = window.getSelection();
                let currentPos = 0;
                const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
                let node;
                while (node = walker.nextNode()) {
                    const nextPos = currentPos + node.textContent.length;
                    if (pos <= nextPos) {
                        range.setStart(node, pos - currentPos);
                        range.collapse(true);
                        break;
                    }
                    currentPos = nextPos;
                }
                if (node) {
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            }

            function updateScenarioLineHighlighting() {
                const el = document.getElementById('playlist-input');
                if (document.activeElement === el) return;

                const text = state._lastScenarioText;
                const activeIndex = (state.activeMode === 'scenario' && state.playlist.length > 0)
                    ? state.currentIndex : -1;

                setScenarioContent(text, activeIndex);
            }

            function getEffectiveResolution(skeletonName, animationName) {
                const available = state.availableResolutions[skeletonName];
                if (!available) return '2x';
                const keys = Object.keys(available);
                if (keys.length === 0) return '2x';

                const animNeedsSD = animationName && animationName.startsWith('sd-');
                let preferred;
                if (animNeedsSD) {
                    preferred = '1x';
                } else {
                    preferred = state.sdMode ? '1x' : '2x';
                }

                if (available[preferred]) return preferred;
                return keys[0];
            }

            const skeletonManager = {
                getAtlasAlias(skeletonName, resolution) {
                    const available = state.availableResolutions[skeletonName];
                    if (available && available[resolution]) {
                        return skeletonName + 'A@' + resolution;
                    }
                    if (available) {
                        const keys = Object.keys(available);
                        if (keys.length > 0) {
                            return skeletonName + 'A@' + keys[0];
                        }
                    }
                    return skeletonName + 'A';
                },

                createSkeleton(skeletonName, resolution) {
                    const atlasAlias = this.getAtlasAlias(skeletonName, resolution);
                    try {
                        const skeleton = spine.Spine.from({
                            skeleton: skeletonName + 'D',
                            atlas: atlasAlias
                        });

                        skeleton.x = state.cameraX;
                        skeleton.y = state.cameraY;
                        skeleton.scale.set(state.currentScale);
                        return skeleton;
                    } catch (e) {
                        throw new Error('[' + skeletonName + '] ' + e.message);
                    }
                },

                switchTo(skeletonName, resolution) {
                    const neededRes = resolution || '2x';
                    const currentRes = state.skeletonResolution[skeletonName];
                    const needsRecreation = !state.skeletons[skeletonName] || currentRes !== neededRes;

                    if (needsRecreation) {
                        if (state.skeletons[skeletonName]) {
                            if (state.currentSkeleton === state.skeletons[skeletonName]) {
                                state.app.stage.removeChild(state.skeletons[skeletonName]);
                            }
                        }

                        state.skeletons[skeletonName] = this.createSkeleton(skeletonName, neededRes);
                        state.skeletonResolution[skeletonName] = neededRes;
                        placeholderManager.buildFor(skeletonName);
                    }

                    if (state.currentSkeleton && state.currentSkeleton !== state.skeletons[skeletonName]) {
                        state.app.stage.removeChild(state.currentSkeleton);
                    }

                    state.currentSkeleton = state.skeletons[skeletonName];
                    state.currentSkeleton.x = state.cameraX;
                    state.currentSkeleton.y = state.cameraY;
                    state.currentSkeleton.scale.set(state.currentScale);
                    state.app.stage.addChild(state.currentSkeleton);
                    state.currentSkeletonName = skeletonName;

                    Object.keys(state.skeletons).forEach(key => {
                        state.skeletons[key].hidden = (key !== skeletonName);
                    });

                    skinManager.restoreSkin(skeletonName);
                    skinManager.updateDropdown(skeletonName);
                    graphicsManager.drawRedLine();
                },

                updateScale(newScale, updateSlider = true) {
                    state.currentScale = newScale;
                    
                    if (state.activeMode === 'museum') {
                        for (const item of state.museum.skeletons) {
                            const skeleton = state.skeletons[item.skeletonName];
                            if (skeleton) {
                                const currentScaleX = skeleton.scale.x;
                                const currentScaleY = skeleton.scale.y;
                                const ratio = newScale / state.museum.cameraScale;
                                skeleton.scale.set(newScale * state.museum.cameraScale);
                            }
                        }
                    } else if (state.currentSkeleton) {
                        state.currentSkeleton.scale.set(state.currentScale);
                        graphicsManager.drawRedLine();
                    }
                    
                    if (updateSlider) {
                        uiControls.updateScaleSlider(state.currentScale);
                    }
                },

                updatePosition(x, y) {
                    state.cameraX = x;
                    state.cameraY = y;
                    if (state.currentSkeleton) {
                        state.currentSkeleton.x = x;
                        state.currentSkeleton.y = y;
                    }
                },

                reset() {
                    this.updateScale(1.0, true);
                    this.updatePosition(state.app.screen.width / 2, state.app.screen.height / 2);
                    uiControls.resetCheckbox();
                    graphicsManager.drawRedLine();
                }
            };

            const museumManager = {
                DEFAULT_SPACING: 300,
                SYM_SPACING: 500,
                FIT_PADDING: 2560,

                init() {
                    this.initTab();
                    this.initCopyButton();
                    this.initPositionInput();
                    this.initResetButton();
                    this.initCanvasInteraction();
                    this.initSelectedInputs();
                    this.initSelectedControls();
                },

                initTab() {
                    const museumHeader = document.getElementById('museumHeader');
                    museumHeader.addEventListener('click', () => {
                        if (state.loadedSkeletons.size === 0) return;
                        this.activateMuseum();
                    });
                },

                initCopyButton() {
                    const copyBtn = document.getElementById('museumCopyBtn');
                    copyBtn.addEventListener('click', () => this.copyPositions());
                },

                initPositionInput() {
                    const input = document.getElementById('museumPositionInput');
                    input.addEventListener('input', () => this.parsePositions(input.value));
                },

                initCanvasInteraction() {
                    const canvas = document.getElementById('canvas');

                    canvas.addEventListener('contextmenu', (e) => {
                        if (state.activeMode === 'museum') {
                            e.preventDefault();
                        }
                    });

                    canvas.addEventListener('mousedown', (e) => {
                        if (state.activeMode !== 'museum') return;
                        e.preventDefault();

                        if (e.button === 0) {
                            this.handleLeftClick(e);
                        } else if (e.button === 2) {
                            this.handleRightClick(e);
                        }
                    });

                    document.addEventListener('mousemove', (e) => {
                        if (state.activeMode !== 'museum') return;
                        this.handleMouseMove(e);
                    });

                    document.addEventListener('mouseup', (e) => {
                        if (state.activeMode !== 'museum') return;
                        this.handleMouseUp(e);
                    });
                },

                handleLeftClick(e) {
                    const canvas = document.getElementById('canvas');
                    const rect = canvas.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;

                    let clickedSkeleton = null;
                    for (const item of state.museum.skeletons) {
                        const skeleton = state.skeletons[item.skeletonName];
                        if (!skeleton || !item.visible) continue;

                        const centerX = skeleton.x;
                        const centerY = skeleton.y;
                        const dist = Math.sqrt((mouseX - centerX) ** 2 + (mouseY - centerY) ** 2);

                        if (dist < 20) {
                            clickedSkeleton = item.skeletonName;
                            break;
                        }
                    }

                    if (clickedSkeleton) {
                        if (!state.museum.selectedSkeletons.includes(clickedSkeleton)) {
                            state.museum.selectedSkeletons = [clickedSkeleton];
                        }

                        state.museum.draggingSkeleton = clickedSkeleton;
                        state.museum.dragStartX = e.clientX;
                        state.museum.dragStartY = e.clientY;

                        for (const name of state.museum.selectedSkeletons) {
                            const item = state.museum.skeletons.find(s => s.skeletonName === name);
                            if (item) {
                                state.museum.skeletonStartPositions[name] = {
                                    worldX: item.worldX,
                                    worldY: item.worldY
                                };
                            }
                        }

                        this.updateDiamondPosition();
                        this.updateSelectedInfo();
                    } else {
                        state.museum.isSelecting = true;
                        state.museum.selectionStartX = mouseX;
                        state.museum.selectionStartY = mouseY;
                        state.museum.selectedSkeletons = [];
                        this.updateDiamondPosition();
                        this.updateSelectedInfo();
                    }
                },

                handleRightClick(e) {
                    state.museum.cameraDragStart = true;
                    state.museum.cameraStartX = e.clientX;
                    state.museum.cameraStartY = e.clientY;
                },

                handleMouseMove(e) {
                    const canvas = document.getElementById('canvas');
                    const rect = canvas.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;

                    if (state.museum.isSelecting) {
                        this.drawSelectionRect(state.museum.selectionStartX, state.museum.selectionStartY, mouseX, mouseY);
                        this.updateSelectionFromRect(state.museum.selectionStartX, state.museum.selectionStartY, mouseX, mouseY);
                    } else if (state.museum.draggingSkeleton) {
                        const deltaX = (e.clientX - state.museum.dragStartX) / state.museum.cameraScale;
                        const deltaY = (e.clientY - state.museum.dragStartY) / state.museum.cameraScale;

                        for (const name of state.museum.selectedSkeletons) {
                            const item = state.museum.skeletons.find(s => s.skeletonName === name);
                            if (!item) continue;

                            const startPos = state.museum.skeletonStartPositions[name];
                            if (!startPos) continue;

                            item.worldX = startPos.worldX + deltaX;
                            item.worldY = startPos.worldY + deltaY;

                            if (state.museum.snapToGrid) {
                                item.worldX = Math.round(item.worldX / 500) * 500;
                                item.worldY = Math.round(item.worldY / 500) * 500;
                            }

                            const skeleton = state.skeletons[name];
                            if (skeleton) {
                                this.applyCameraTransform(skeleton, item.worldX, item.worldY);
                            }
                        }

                        this.updateDiamondPosition();
                        this.updateSelectedInfo();
                    } else if (state.museum.cameraDragStart) {
                        const deltaX = e.clientX - state.museum.cameraStartX;
                        const deltaY = e.clientY - state.museum.cameraStartY;

                        state.museum.cameraOffsetX += deltaX;
                        state.museum.cameraOffsetY += deltaY;

                        state.museum.cameraStartX = e.clientX;
                        state.museum.cameraStartY = e.clientY;

                        this.updateAllSkeletonPositions();
                        this.drawWorkspace();
                    } else {
                        this.checkHover(mouseX, mouseY);
                    }
                },

                handleMouseUp(e) {
                    if (state.museum.isSelecting) {
                        state.museum.isSelecting = false;
                        this.clearSelectionRect();
                    }
                    if (state.museum.draggingSkeleton) {
                        state.museum.draggingSkeleton = null;
                    }
                    if (state.museum.cameraDragStart) {
                        state.museum.cameraDragStart = false;
                    }
                },

                checkHover(mouseX, mouseY) {
                    let hovered = null;
                    for (const item of state.museum.skeletons) {
                        const skeleton = state.skeletons[item.skeletonName];
                        if (!skeleton || !item.visible) continue;

                        const centerX = skeleton.x;
                        const centerY = skeleton.y;
                        const dist = Math.sqrt((mouseX - centerX) ** 2 + (mouseY - centerY) ** 2);

                        if (dist < 20) {
                            hovered = item.skeletonName;
                            break;
                        }
                    }

                    if (state.museum.hoveredSkeleton !== hovered) {
                        state.museum.hoveredSkeleton = hovered;
                        this.updateDiamondStyle();
                    }
                },

                updateDiamondPosition() {
                    if (!state.museum.centerDiamondGraphics) return;
                    state.museum.centerDiamondGraphics.clear();

                    for (const item of state.museum.skeletons) {
                        const skeleton = state.skeletons[item.skeletonName];
                        if (!skeleton || !item.visible) continue;

                        const centerX = skeleton.x;
                        const centerY = skeleton.y;
                        const isHovered = state.museum.hoveredSkeleton === item.skeletonName;
                        const isSelected = state.museum.selectedSkeletons.includes(item.skeletonName);

                        if (isSelected || isHovered) {
                            const size = 10;
                            const g = state.museum.centerDiamondGraphics;
                            g.beginPath();
                            g.moveTo(centerX, centerY - size);
                            g.lineTo(centerX + size, centerY);
                            g.lineTo(centerX, centerY + size);
                            g.lineTo(centerX - size, centerY);
                            g.closePath();
                            g.fill({ color: 0xffffff, alpha: 0.5 });
                            g.stroke({ width: 2, color: 0x000000, alpha: 1.0 });
                        }
                    }

                    state.museum.centerDiamondGraphics.alpha = 1.0;

                    const named = new Set(state.museum.selectedSkeletons);
                    if (state.museum.hoveredSkeleton) {
                        named.add(state.museum.hoveredSkeleton);
                    }

                    for (const name of Object.keys(state.museum.hoverLabelObjects)) {
                        if (!named.has(name)) {
                            state.museum.hoverLabelObjects[name].visible = false;
                        }
                    }

                    for (const name of named) {
                        const sk = state.skeletons[name];
                        if (!sk) continue;
                        let label = state.museum.hoverLabelObjects[name];
                        if (!label) {
                            label = new PIXI.Text({
                                text: name,
                                style: {
                                    fontFamily: 'Arial',
                                    fontSize: 14,
                                    fill: 0xffffff,
                                    stroke: { color: 0x000000, width: 3, join: 'round' },
                                    align: 'center'
                                }
                            });
                            label.anchor.set(0.5, 0.5);
                            state.museum.hoverLabelObjects[name] = label;
                            state.app.stage.addChild(label);
                        }
                        label.text = name;
                        label.x = sk.x;
                        label.y = sk.y - 24;
                        label.visible = true;
                        state.app.stage.addChild(label);
                    }
                },

                updateDiamondStyle() {
                    this.updateDiamondPosition();
                },

                updateSelectedInfo() {
                    const nameInput = document.getElementById('selectedNameInput');
                    const xInput = document.getElementById('selectedXInput');
                    const yInput = document.getElementById('selectedYInput');
                    if (!nameInput || !xInput || !yInput) return;

                    const selected = state.museum.selectedSkeletons;

                    if (selected.length === 0) {
                        nameInput.value = '';
                        xInput.value = '';
                        yInput.value = '';
                        this.buildSelectedAnimationDropdown();
                        this.updateSelectedPlaybackButtons();
                        this.updateListSelection();
                        return;
                    }

                    nameInput.value = selected.join(', ');

                    const items = selected
                        .map(n => state.museum.skeletons.find(s => s.skeletonName === n))
                        .filter(Boolean);

                    if (items.length === 0) {
                        xInput.value = '';
                        yInput.value = '';
                        this.buildSelectedAnimationDropdown();
                        this.updateSelectedPlaybackButtons();
                        this.updateListSelection();
                        return;
                    }

                    const allSameX = items.every(i => Math.round(i.worldX) === Math.round(items[0].worldX));
                    const allSameY = items.every(i => Math.round(i.worldY) === Math.round(items[0].worldY));

                    xInput.value = allSameX ? String(Math.round(items[0].worldX)) : '';
                    yInput.value = allSameY ? String(Math.round(items[0].worldY)) : '';

                    this.buildSelectedAnimationDropdown();
                    this.updateSelectedPlaybackButtons();
                    this.updateListSelection();
                },

                applyCoordinateInput(axis, value) {
                    const num = parseInt(value, 10);
                    if (isNaN(num)) return;

                    for (const name of state.museum.selectedSkeletons) {
                        const item = state.museum.skeletons.find(s => s.skeletonName === name);
                        if (!item) continue;

                        if (axis === 'x') item.worldX = num;
                        else item.worldY = num;

                        const skeleton = state.skeletons[name];
                        if (skeleton) {
                            this.applyCameraTransform(skeleton, item.worldX, item.worldY);
                        }
                    }

                    this.updateDiamondPosition();
                },

                initSelectedInputs() {
                    const xInput = document.getElementById('selectedXInput');
                    const yInput = document.getElementById('selectedYInput');
                    if (!xInput || !yInput) return;

                    xInput.addEventListener('change', () => this.applyCoordinateInput('x', xInput.value));
                    yInput.addEventListener('change', () => this.applyCoordinateInput('y', yInput.value));

                    xInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') xInput.blur(); });
                    yInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') yInput.blur(); });
                },

                initSelectedControls() {
                    const playPauseBtn = document.getElementById('museumPlayPauseBtn');
                    const stopBtn = document.getElementById('museumStopBtn');
                    const playAllBtn = document.getElementById('museumPlayAllBtn');
                    if (playPauseBtn) playPauseBtn.addEventListener('click', () => this.togglePlayPauseSelected());
                    if (stopBtn) stopBtn.addEventListener('click', () => this.stopSelected());
                    if (playAllBtn) playAllBtn.addEventListener('click', () => this.togglePlayAllSelected());

                    const positionSlider = document.getElementById('selectedPositionSlider');
                    if (positionSlider) {
                        positionSlider.addEventListener('mousedown', (e) => { e.stopPropagation(); this._selectedSeeking = true; });
                        positionSlider.addEventListener('touchstart', () => { this._selectedSeeking = true; }, { passive: true });
                        positionSlider.addEventListener('input', () => {
                            this.seekSelected(positionSlider.value / 1000);
                        });
                        const endSelectedSeek = () => { this._selectedSeeking = false; };
                        positionSlider.addEventListener('mouseup', endSelectedSeek);
                        positionSlider.addEventListener('touchend', endSelectedSeek);
                    }

                    document.addEventListener('click', (e) => {
                        const container = document.getElementById('selectedAnimationDropdown');
                        if (!container) return;
                        if (!container.classList.contains('open')) return;
                        if (container.contains(e.target)) return;
                        container.classList.remove('open');
                    });

                    document.addEventListener('mouseup', () => this.endVisibilityPaint());
                    document.addEventListener('mouseleave', () => this.endVisibilityPaint());
                },

                drawSelectionRect(x1, y1, x2, y2) {
                    if (!state.museum.selectionGraphics) {
                        state.museum.selectionGraphics = new PIXI.Graphics();
                        state.app.stage.addChild(state.museum.selectionGraphics);
                    }
                    if (!state.museum.selectionGraphics.parent) {
                        state.app.stage.addChild(state.museum.selectionGraphics);
                    }
                    const g = state.museum.selectionGraphics;
                    g.clear();
                    const minX = Math.min(x1, x2);
                    const minY = Math.min(y1, y2);
                    const w = Math.abs(x2 - x1);
                    const h = Math.abs(y2 - y1);
                    g.rect(minX, minY, w, h);
                    g.fill({ color: 0x3399FF, alpha: 0.12 });
                    g.stroke({ width: 1, color: 0x3399FF, alpha: 0.8 });
                },

                clearSelectionRect() {
                    if (state.museum.selectionGraphics) {
                        state.museum.selectionGraphics.clear();
                    }
                },

                updateSelectionFromRect(x1, y1, x2, y2) {
                    const minX = Math.min(x1, x2);
                    const maxX = Math.max(x1, x2);
                    const minY = Math.min(y1, y2);
                    const maxY = Math.max(y1, y2);

                    const selected = [];
                    for (const item of state.museum.skeletons) {
                        const skeleton = state.skeletons[item.skeletonName];
                        if (!skeleton || !item.visible) continue;
                        if (skeleton.x >= minX && skeleton.x <= maxX && skeleton.y >= minY && skeleton.y <= maxY) {
                            selected.push(item.skeletonName);
                        }
                    }
                    state.museum.selectedSkeletons = selected;
                    this.updateDiamondPosition();
                    this.updateSelectedInfo();
                },

                updateAllSkeletonPositions() {
                    for (const item of state.museum.skeletons) {
                        const skeleton = state.skeletons[item.skeletonName];
                        if (skeleton && item.visible) {
                            this.applyCameraTransform(skeleton, item.worldX, item.worldY);
                        }
                    }

                    this.updateDiamondPosition();
                },

                activateMuseum() {
                    if (state.activeMode === 'museum') return;
                    state.activeMode = 'museum';
                    state.scenarioGeneration++;
                    playerManager.resetPhase();

                    if (state.currentSkeleton) {
                        state.currentSkeleton.state.clearTracks();
                    }

                    uiControls.updateHighlighting();
                    this.setupMuseumView();
                },

                setupMuseumView() {
                    if (!state.app) return;

                    state.app.stage.removeChildren();

                    state.museum.selectedSkeletons = [];
                    state.museum.isSelecting = false;
                    if (state.museum.selectionGraphics) {
                        state.museum.selectionGraphics.clear();
                    }
                    this.updateSelectedInfo();

                    if (!state.museum.workspaceGraphics) {
                        state.museum.workspaceGraphics = new PIXI.Graphics();
                    }

                    if (!state.museum.centerDiamondGraphics) {
                        state.museum.centerDiamondGraphics = new PIXI.Graphics();
                    }

                    state.app.stage.addChild(state.museum.workspaceGraphics);
                    state.app.stage.addChild(state.museum.centerDiamondGraphics);

                    const skeletonNames = Array.from(state.loadedSkeletons).sort((a, b) => this.sortSkeletonsForLayering(a, b));
                    const layout = this.computeLayout();
                    const savedState = {};
                    const isFirstBuild = state.museum.skeletons.length === 0;

                    if (isFirstBuild) {
                        state.museum.skeletons = skeletonNames.map((name) => {
                            const pos = layout[name] || { x: 0, y: 0 };
                            const saved = savedState.skeletonStates ? savedState.skeletonStates[name] : null;
                            if (saved) {
                                const anim = (saved.animation && this.hasAnimation(name, saved.animation))
                                    ? saved.animation
                                    : this.getDefaultAnimation(name);
                                return {
                                    skeletonName: name,
                                    visible: saved.visible !== undefined ? saved.visible : true,
                                    animation: anim,
                                    isPlaying: saved.isPlaying !== undefined ? saved.isPlaying : true,
                                    worldX: saved.x,
                                    worldY: saved.y
                                };
                            }
                            return {
                                skeletonName: name,
                                visible: true,
                                animation: this.getDefaultAnimation(name),
                                isPlaying: true,
                                worldX: pos.x,
                                worldY: pos.y
                            };
                        });
                        
                        if (savedState.skeletonOrder && savedState.skeletonOrder.length > 0) {
                            state.museum.skeletons.sort((a, b) => {
                                const indexA = savedState.skeletonOrder.indexOf(a.skeletonName);
                                const indexB = savedState.skeletonOrder.indexOf(b.skeletonName);
                                return indexA - indexB;
                            });
                        }
                        
                        if (savedState.cameraState) {
                            if (savedState.cameraState.cameraOffsetX !== undefined) {
                                state.museum.cameraOffsetX = savedState.cameraState.cameraOffsetX;
                            }
                            if (savedState.cameraState.cameraOffsetY !== undefined) {
                                state.museum.cameraOffsetY = savedState.cameraState.cameraOffsetY;
                            }
                            if (savedState.cameraState.cameraScale !== undefined) {
                                state.museum.cameraScale = savedState.cameraState.cameraScale;
                            }
                            if (savedState.cameraState.snapToGrid !== undefined) {
                                state.museum.snapToGrid = savedState.cameraState.snapToGrid;
                            }
                        }
                    } else {
                        const existingNames = state.museum.skeletons.map(s => s.skeletonName);
                        const newNames = skeletonNames.filter(n => !existingNames.includes(n));

                        newNames.forEach((name) => {
                            const pos = layout[name] || { x: 0, y: 0 };
                            const saved = savedState.skeletonStates ? savedState.skeletonStates[name] : null;
                            if (saved) {
                                const anim = (saved.animation && this.hasAnimation(name, saved.animation))
                                    ? saved.animation
                                    : this.getDefaultAnimation(name);
                                state.museum.skeletons.push({
                                    skeletonName: name,
                                    visible: saved.visible !== undefined ? saved.visible : true,
                                    animation: anim,
                                    isPlaying: saved.isPlaying !== undefined ? saved.isPlaying : true,
                                    worldX: saved.x,
                                    worldY: saved.y
                                });
                            } else {
                                state.museum.skeletons.push({
                                    skeletonName: name,
                                    visible: true,
                                    animation: this.getDefaultAnimation(name),
                                    isPlaying: true,
                                    worldX: pos.x,
                                    worldY: pos.y
                                });
                            }
                        });

                         state.museum.skeletons = state.museum.skeletons.filter(s => skeletonNames.includes(s.skeletonName));
                         state.museum.skeletons.sort((a, b) => this.sortSkeletonsForLayering(a.skeletonName, b.skeletonName));
                     }

                     const hasCameraState = savedState.cameraState && (
                         savedState.cameraState.cameraOffsetX !== undefined ||
                         savedState.cameraState.cameraOffsetY !== undefined ||
                         savedState.cameraState.cameraScale !== undefined
                     );

                     if (isFirstBuild && !hasCameraState) {
                         this.fitCameraToContent(this.FIT_PADDING);
                     }

                     skeletonNames.forEach(name => {
                        const item = state.museum.skeletons.find(s => s.skeletonName === name);
                        if (!item) return;

                        const resolution = getEffectiveResolution(name, item.animation);
                        
                        if (!state.skeletons[name]) {
                            try {
                                state.skeletons[name] = skeletonManager.createSkeleton(name, resolution);
                                state.skeletonResolution[name] = resolution;
                                placeholderManager.buildFor(name);
                            } catch (e) {
                                console.error('Failed to create skeleton:', name, e);
                                return;
                            }
                        }

                        const skeleton = state.skeletons[name];
                        skeleton.scale.set(state.currentScale);
                        skeleton.visible = item.visible;
                        this.setAnimation(name, item.animation);
                        this.applyCameraTransform(skeleton, item.worldX, item.worldY);

                        if (isFirstBuild) {
                            const skins = state.availableSkins[name] || [];
                            const nonDefaultSkins = skins.filter(s => s !== 'default');
                            const currentSkin = state.selectedSkins[name];
                            const alreadyCustom = currentSkin && currentSkin !== 'default' && nonDefaultSkins.includes(currentSkin);
                            if (nonDefaultSkins.length > 0 && !alreadyCustom) {
                                const sortedSkins = [...nonDefaultSkins].sort((a, b) => a.localeCompare(b));
                                skinManager.applySkin(name, sortedSkins[0]);
                            }
                            skeleton.state.timeScale = item.isPlaying ? 1 : 0;
                            const saved = savedState.skeletonStates ? savedState.skeletonStates[name] : null;
                            if (saved && saved.trackTime !== undefined) {
                                const track = skeleton.state.getCurrent(0);
                                if (track) {
                                    const dur = track.animation ? track.animation.duration : 0;
                                    let tt = saved.trackTime;
                                    if (dur > 0 && tt > dur) tt = tt % dur;
                                    if (tt < 0) tt = 0;
                                    track.trackTime = tt;
                                }
                            }
                        }
                        
                        if (item.visible) {
                            state.app.stage.addChild(skeleton);
                        }
                    });

                    this.renderSkeletonList();
                    this.applyRenderOrder();
                    this.drawWorkspace();
                    this.updateDiamondPosition();
                    uiControls.updateScaleSlider(state.museum.cameraScale);
                },

                sortSkeletonsForLayering(a, b) {
                    const priorityA = this.getSkeletonLayerPriority(a);
                    const priorityB = this.getSkeletonLayerPriority(b);
                    if (priorityA !== priorityB) {
                        return priorityB - priorityA;
                    }
                    return a.localeCompare(b);
                },

                getSkeletonLayerPriority(name) {
                    if (name === 'game-scenes') return 0;
                    if (name === 'reels-box') return 1;
                    return 2;
                },

                applyCameraTransform(skeleton, worldX, worldY) {
                    const screenX = worldX * state.museum.cameraScale + state.museum.cameraOffsetX;
                    const screenY = worldY * state.museum.cameraScale + state.museum.cameraOffsetY;
                    skeleton.x = screenX;
                    skeleton.y = screenY;
                    skeleton.scale.set(state.museum.cameraScale);
                },

                setCameraScale(scale) {
                    const oldScale = state.museum.cameraScale;
                    const screenW = state.app.screen.width;
                    const screenH = state.app.screen.height;
                    const screenCenterX = screenW / 2;
                    const screenCenterY = screenH / 2;

                    const worldCenterX = (screenCenterX - state.museum.cameraOffsetX) / oldScale;
                    const worldCenterY = (screenCenterY - state.museum.cameraOffsetY) / oldScale;

                    state.museum.cameraScale = scale;
                    state.museum.cameraOffsetX = screenCenterX - worldCenterX * scale;
                    state.museum.cameraOffsetY = screenCenterY - worldCenterY * scale;

                    this.updateAllSkeletonPositions();
                    this.drawWorkspace();
                },

                computeLayout() {
                    const skeletonNames = Array.from(state.loadedSkeletons);
                    const specialNames = ['reels-box', 'game-scenes'];
                    const symNames = skeletonNames.filter(n => n.startsWith('sym')).sort((a, b) => a.localeCompare(b));
                    const otherNames = skeletonNames.filter(n => !n.startsWith('sym') && !specialNames.includes(n)).sort((a, b) => a.localeCompare(b));

                    const layout = {};
                    let x = 0;
                    for (const name of symNames) {
                        layout[name] = { x: x, y: 0 };
                        x += this.SYM_SPACING;
                    }
                    x = 0;
                    for (const name of otherNames) {
                        layout[name] = { x: x, y: 1000 };
                        x += this.SYM_SPACING;
                    }
                    if (skeletonNames.includes('reels-box')) {
                        layout['reels-box'] = { x: 0, y: 4000 };
                    }
                    if (skeletonNames.includes('game-scenes')) {
                        layout['game-scenes'] = { x: 4000, y: 4000 };
                    }
                    return layout;
                },

                fitCameraToContent(padding) {
                    if (!state.app) return;
                    const items = state.museum.skeletons;
                    if (items.length === 0) {
                        state.museum.cameraScale = 1.0;
                        state.museum.cameraOffsetX = 0;
                        state.museum.cameraOffsetY = state.app.screen.height / 2;
                        return;
                    }

                    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                    for (const item of items) {
                        if (item.worldX < minX) minX = item.worldX;
                        if (item.worldX > maxX) maxX = item.worldX;
                        if (item.worldY < minY) minY = item.worldY;
                        if (item.worldY > maxY) maxY = item.worldY;
                    }

                    const p = padding;
                    const worldLeft = minX - p;
                    const worldRight = maxX + p;
                    const worldTop = minY - p;
                    const worldBottom = maxY + p;
                    const worldWidth = worldRight - worldLeft;
                    const worldHeight = worldBottom - worldTop;

                    const screenW = state.app.screen.width;
                    const screenH = state.app.screen.height;

                    let scale;
                    if (worldWidth > 0 && worldHeight > 0) {
                        scale = Math.min(screenW / worldWidth, screenH / worldHeight);
                    } else {
                        scale = 1.0;
                    }
                    scale = Math.max(0.05, Math.min(2.0, scale));

                    const worldCenterX = (worldLeft + worldRight) / 2;
                    const worldCenterY = (worldTop + worldBottom) / 2;

                    state.museum.cameraScale = scale;
                    state.museum.cameraOffsetX = screenW / 2 - worldCenterX * scale;
                    state.museum.cameraOffsetY = screenH / 2 - worldCenterY * scale;
                },

                resetCamera() {
                    this.fitCameraToContent(this.FIT_PADDING);
                    this.updateAllSkeletonPositions();
                    this.drawWorkspace();
                    uiControls.updateScaleSlider(state.museum.cameraScale);
                },

                drawWorkspace() {
                    if (!state.museum.workspaceGraphics) return;
                    graphicsManager.drawAxesAndGrid(
                        state.museum.workspaceGraphics,
                        state.museum.cameraScale,
                        state.museum.cameraOffsetX,
                        state.museum.cameraOffsetY
                    );
                },

                getDefaultAnimation(skeletonName) {
                    const skeleton = state.skeletons[skeletonName];
                    if (!skeleton || !skeleton.skeleton || !skeleton.skeleton.data) return '';

                    const animations = skeleton.skeleton.data.animations || [];
                    if (animations.length === 0) return '';

                    const idleAnim = animations.find(a => a.name.toLowerCase().includes('idle'));
                    if (idleAnim) return idleAnim.name;

                    const loopAnim = animations.find(a => a.name.toLowerCase().includes('loop'));
                    if (loopAnim) return loopAnim.name;

                    return animations[0].name;
                },

                setAnimation(skeletonName, animationName) {
                    const skeleton = state.skeletons[skeletonName];
                    if (!skeleton) return;

                    const track = skeleton.state.setAnimation(0, animationName, true);
                    if (track) {
                        track.timeScale = 1;
                    }

                    if (track && track.animation && track.animation.duration <= 0) {
                        skeleton.skeleton.setToSetupPose();
                    }
                },

                onResolutionChange() {
                    if (state.activeMode !== 'museum') return;
                    let changed = false;
                    for (const item of state.museum.skeletons) {
                        const name = item.skeletonName;
                        const newRes = getEffectiveResolution(name, item.animation);
                        const curRes = state.skeletonResolution[name];
                        if (newRes === curRes) continue;
                        changed = true;

                        const oldSkeleton = state.skeletons[name];
                        if (oldSkeleton && oldSkeleton.parent) {
                            oldSkeleton.parent.removeChild(oldSkeleton);
                            oldSkeleton.destroy();
                        }

                        try {
                            state.skeletons[name] = skeletonManager.createSkeleton(name, newRes);
                            state.skeletonResolution[name] = newRes;
                            placeholderManager.buildFor(name);
                        } catch (e) {
                            console.error('Failed to recreate skeleton:', name, e);
                            continue;
                        }
