                    const endSeekPos = () => this.endSeeking();

                    const scenarioSlider = document.getElementById('scenarioSlider');

                    scenarioSlider.addEventListener('touchstart', () => this.startSeeking('scenario'), { passive: true });

                    const endSeekSc = () => this.endSeeking();

                    this.updatePlayPauseButton();

                }
            };

            const fileHandler = {
                showLoading() {
                    document.getElementById('loadingOverlay').classList.add('active');
                },

                hideLoading() {
                    document.getElementById('loadingOverlay').classList.remove('active');
                },

                findTextureForAtlas(atlasFileName, textureFiles) {
                    const baseName = atlasFileName.replace('.atlas', '');
                    return textureFiles.find(f => {
                        const name = f.name.replace(/\.(webp|png|jpg)$/, '');
                        return name === baseName;
                    });
                },

                async loadAtlasTexture(skeletonName, resolution, atlasFile, textureFile) {
                    const atlasText = await atlasFile.text();
                    const textureBlobUrl = URL.createObjectURL(textureFile);
                    state.blobUrls.push(textureBlobUrl);
                    const img = new Image();
                    img.src = textureBlobUrl;
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                    });
                    const pixiTexture = PIXI.Texture.from(img);
                    state.pixiTextures.push(pixiTexture);

                    const spineAtlas = new spine.TextureAtlas(atlasText);
                    for (const page of spineAtlas.pages) {
                        page.setTexture(spine.SpineTexture.from(pixiTexture.source));
                    }

                    const cacheKey = skeletonName + 'A@' + resolution;
                    PIXI.Cache.remove(cacheKey);
                    PIXI.Cache.set(cacheKey, spineAtlas);
                },

                collectSpineErrors(fn) {
                    const errors = [];
                    const origError = console.error;
                    const origWarn = console.warn;
                    console.error = (...args) => {
                        errors.push(args.map(a => typeof a === 'string' ? a : a instanceof Error ? a.message : String(a)).join(' '));
                        origError.apply(console, args);
                    };
                    console.warn = (...args) => {
                        errors.push(args.map(a => typeof a === 'string' ? a : a instanceof Error ? a.message : String(a)).join(' '));
                        origWarn.apply(console, args);
                    };
                    try {
                        const result = fn();
                        console.error = origError;
                        console.warn = origWarn;
                        return { result, errors };
                    } catch (e) {
                        console.error = origError;
                        console.warn = origWarn;
                        errors.push(e.message);
                        return { result: null, errors };
                    }
                },

                cleanupPrevious() {
                    if (state.currentSkeleton) {
                        state.currentSkeleton.state.clearTracks();
                        state.app.stage.removeChild(state.currentSkeleton);
                    }

                    placeholderManager.resetAll();

                    Object.keys(state.skeletons).forEach(key => {
                        const sk = state.skeletons[key];
                        if (sk) sk.destroy();
                    });

                    state.pixiTextures.forEach(tex => {
                        try { tex.destroy(true); } catch(e) {}
                    });
                    state.pixiTextures = [];

                    state.blobUrls.forEach(url => {
                        URL.revokeObjectURL(url);
                    });
                    state.blobUrls = [];

                    Object.keys(state.availableResolutions).forEach(skeletonName => {
                        const resKeys = Object.keys(state.availableResolutions[skeletonName]);
                        resKeys.forEach(res => {
                            PIXI.Cache.remove(skeletonName + 'A@' + res);
                        });
                    });

                    Object.keys(state.skeletonResolution).forEach(skeletonName => {
                        PIXI.Cache.remove(skeletonName + 'D');
                    });

                    Object.keys(state.skeletonResolution).forEach(skeletonName => {
                        const resKeys = state.availableResolutions[skeletonName]
                            ? Object.keys(state.availableResolutions[skeletonName])
                            : [];
                        resKeys.forEach(res => {
                            const cacheKey = skeletonName + 'D-' + skeletonName + 'A@' + res + '-1';
                            PIXI.Cache.remove(cacheKey);
                        });
                    });

                        state.skeletons = {};
                        state.skeletonResolution = {};
                        state.availableResolutions = {};
                        state.loadedSkeletons.clear();
                        state.availableAnimations = [];
                        state.availableSkins = {};
                        state.currentSkeleton = null;
                        state.currentSkeletonName = '';
                        state.currentScale = 1.0;
                        state.cameraX = state.app.screen.width / 2;
                        state.cameraY = state.app.screen.height / 2;
                        state.currentIndex = 0;
                        state.isPlaying = false;
                        state.activeAnimation = null;
                        state._lastScenarioText = '';

                    state.player.playing = true;
                    state.player.loop = true;
                    state.player.pauseBefore = false;
                    state.player.pauseAfter = false;
                    state.player.phase = 'none';
                    state.player.phaseElapsed = 0;
                    state.player.pendingAction = null;
                    state.player.lastTickTime = performance.now();
                    playerManager.updatePlayPauseButton();
                    playerManager.updateLoopButton();
                    playerManager.updatePauseBeforeButton();
                    playerManager.updatePauseAfterButton();

                    if (state.redLineGraphics) {
                        state.app.stage.removeChild(state.redLineGraphics);
                        state.redLineGraphics.destroy();
                        state.redLineGraphics = null;
                    }

                    skeletonManager.updateScale(1.0, true);
                    skeletonManager.updatePosition(state.cameraX, state.cameraY);
                    graphicsManager.drawRedLine();
                    hideError();
                    state.hasLoadError = false;
                    state.hasPlaylistError = false;
                    state.zeroAlphaWarnings = [];
                    document.getElementById('skinSection').classList.remove('visible');
                },

                async handleFiles(fileList) {
                    const files = Array.from(fileList);
                    const skelFiles = files.filter(f => f.name.endsWith('.skel'));
                    const atlasFiles = files.filter(f => f.name.endsWith('.atlas'));
                    const textureFiles = files.filter(f => /\.(webp|png|jpg)$/.test(f.name));

                    if (skelFiles.length === 0) {
                        alert('Skeleton file (.skel) not found');
                        return;
                    }

                    this.showLoading();

                    try {
                        this.cleanupPrevious();
                        state.scenarioGeneration++;

                        let scenarioText = '';

                        for (const skelFile of skelFiles) {
                            const skeletonName = skelFile.name.replace('.skel', '');

                            const skelData = new Uint8Array(await skelFile.arrayBuffer());
                            PIXI.Cache.set(skeletonName + 'D', skelData);

                            const resolutions = {};

                            const atlas2x = atlasFiles.find(f => f.name === skeletonName + '@2x.atlas');
                            if (atlas2x) {
                                const tex2x = this.findTextureForAtlas(atlas2x.name, textureFiles);
                                if (tex2x) {
                                    await this.loadAtlasTexture(skeletonName, '2x', atlas2x, tex2x);
                                    resolutions['2x'] = true;
                                }
                            }

                            const atlas1x = atlasFiles.find(f => f.name === skeletonName + '@1x.atlas');
                            if (atlas1x) {
                                const tex1x = this.findTextureForAtlas(atlas1x.name, textureFiles);
                                if (tex1x) {
                                    await this.loadAtlasTexture(skeletonName, '1x', atlas1x, tex1x);
                                    resolutions['1x'] = true;
                                }
                            }

                            if (!resolutions['2x'] && !resolutions['1x']) {
                                const atlasDefault = atlasFiles.find(f => f.name === skeletonName + '.atlas');
                                if (atlasDefault) {
                                    const texDefault = this.findTextureForAtlas(atlasDefault.name, textureFiles);
                                    if (texDefault) {
                                        await this.loadAtlasTexture(skeletonName, '2x', atlasDefault, texDefault);
                                        resolutions['2x'] = true;
                                    }
                                }
                            }

                            if (Object.keys(resolutions).length === 0) {
                                console.warn('No atlas/texture found for ' + skeletonName);
                                continue;
                            }

                            state.availableResolutions[skeletonName] = resolutions;
                            state.loadedSkeletons.add(skeletonName);

                            const initialRes = state.sdMode ? (resolutions['1x'] ? '1x' : Object.keys(resolutions)[0]) : (resolutions['2x'] ? '2x' : Object.keys(resolutions)[0]);

                            if (!state.skeletons[skeletonName]) {
                                const { result, errors } = this.collectSpineErrors(() => {
                                    return skeletonManager.createSkeleton(skeletonName, initialRes);
                                });
                                if (result) {
                                    state.skeletons[skeletonName] = result;
                                    state.skeletonResolution[skeletonName] = initialRes;
                                    placeholderManager.buildFor(skeletonName);
                                }
                                if (errors.length > 0) {
                                    showError('[' + skeletonName + '] ' + errors.join('\n'));
                                    state.hasLoadError = true;
                                }
                            }

                            const skeletonObj = state.skeletons[skeletonName];
                            if (!skeletonObj) continue;

                            let animations = [];
                            try {
                                const skeletonData = skeletonObj.skeleton?.data || skeletonObj.state?.data?.skeletonData;
                                animations = (skeletonData?.animations || []).map(a => a.name);
                            } catch (e) {
                                console.error('Failed to read animations:', e);
                            }

                            animations.forEach(anim => {
                                state.availableAnimations.push({ skeletonName, animationName: anim });
                            });

                            const zeroWarnings = placeholderManager.detectZeroAlpha(skeletonName);
                            if (zeroWarnings.length > 0) {
                                state.zeroAlphaWarnings = state.zeroAlphaWarnings.concat(zeroWarnings);
                            }

                            const skins = skinManager.readSkins(skeletonName);
                            state.availableSkins[skeletonName] = skins;

                            const newLines = animations.map(anim => skeletonName + '|' + anim);
                            if (scenarioText.trim()) {
                                scenarioText += '\n' + newLines.join('\n');
                            } else {
                                scenarioText = newLines.join('\n');
                            }
                        }

                        uiControls.renderAnimationsList();
                        await playlistManager.onTextChange(scenarioText);
                    } catch (error) {
                        console.error('Upload error:', error);
                        showError('Upload error: ' + error.message);
                        state.hasLoadError = true;
                    } finally {
                        this.hideLoading();
                    }
                },

                async traverseEntry(entry) {
                    if (entry.isFile) {
                        return new Promise((resolve) => {
                            entry.file((file) => {
                                if (/\.(skel|atlas|webp|png|jpg)$/.test(file.name)) {
                                    resolve([file]);
                                } else {
                                    resolve([]);
                                }
                            }, () => resolve([]));
                        });
                    } else if (entry.isDirectory) {
                        const reader = entry.createReader();
                        const entries = await new Promise((resolve) => {
                            const results = [];
                            const readBatch = () => {
                                reader.readEntries((batch) => {
                                    if (batch.length === 0) {
                                        resolve(results);
                                    } else {
                                        results.push(...batch);
                                        readBatch();
                                    }
                                }, () => resolve(results));
                            };
                            readBatch();
                        });
                        const nested = await Promise.all(entries.map(e => this.traverseEntry(e)));
                        return nested.flat();
                    }
                    return [];
                },

                async collectFilesFromDataTransfer(dataTransfer) {
                    const items = dataTransfer.items;
                    if (items && items.length > 0 && items[0].webkitGetAsEntry) {
                        const entries = [];
                        for (let i = 0; i < items.length; i++) {
                            const entry = items[i].webkitGetAsEntry();
                            if (entry) entries.push(entry);
                        }
                        const nested = await Promise.all(entries.map(e => this.traverseEntry(e)));
                        return nested.flat();
                    }
                    return Array.from(dataTransfer.files).filter(f => /\.(skel|atlas|webp|png|jpg)$/.test(f.name));
                },

                initDragDrop() {
                    const dropZone = document.getElementById('dropZone');
                    let dragCounter = 0;

                    document.addEventListener('dragenter', (e) => {
                        e.preventDefault();
                        if (e.dataTransfer.types.includes('Files')) {
                            dragCounter++;
                            dropZone.classList.add('active');
                        }
                    });

                    document.addEventListener('dragleave', (e) => {
                        e.preventDefault();
                        dragCounter--;
                        if (dragCounter <= 0) {
                            dragCounter = 0;
                            dropZone.classList.remove('active');
                        }
                    });

                    document.addEventListener('dragover', (e) => {
                        e.preventDefault();
                    });

                    document.addEventListener('drop', async (e) => {
                        e.preventDefault();
                        dragCounter = 0;
                        dropZone.classList.remove('active');
                        const files = await this.collectFilesFromDataTransfer(e.dataTransfer);
                        if (files.length > 0) {
                            this.handleFiles(files);
                        }
                    });
                },

                initUploadButton() {
                    const uploadButton = document.getElementById('uploadButton');
                    const fileInput = document.getElementById('fileInput');
                    uploadButton.addEventListener('click', () => fileInput.click());
                    fileInput.addEventListener('change', () => {
                        if (fileInput.files.length > 0) {
                            this.handleFiles(fileInput.files);
                            fileInput.value = '';
                        }
                    });
                },

                initFolderButton() {
                    const folderButton = document.getElementById('folderButton');
                    const folderInput = document.getElementById('folderInput');
                    folderButton.addEventListener('click', () => folderInput.click());
                    folderInput.addEventListener('change', () => {
                        if (folderInput.files.length > 0) {
                            const filtered = Array.from(folderInput.files).filter(
                                f => /\.(skel|atlas|webp|png|jpg)$/.test(f.name)
                            );
                            if (filtered.length > 0) {
                                this.handleFiles(filtered);
                            } else {
                                alert('No .skel, .atlas, or .webp files found in folder');
                            }
                            folderInput.value = '';
                        }
                    });
                }
            };

            const eventHandlers = {
                initResize() {
                    const resizeHandle = document.getElementById('resize-handle');
                    const leftPanel = document.querySelector('.left-panel');

                    resizeHandle.addEventListener('mousedown', (e) => {
                        state.isResizing = true;
                        state.resizeStartX = e.clientX;
                        state.leftPanelStartWidth = leftPanel.offsetWidth;
                        document.body.style.cursor = 'col-resize';
                        document.body.style.userSelect = 'none';
                        e.preventDefault();
                    });

                    document.addEventListener('mousemove', (e) => {
                        if (!state.isResizing) return;
                        const deltaX = e.clientX - state.resizeStartX;
                        const newWidth = state.leftPanelStartWidth + deltaX;
                        if (newWidth > 0) {
                            leftPanel.style.width = newWidth + 'px';
                            this.handlePanelResize(newWidth);
                            if (state.activeMode !== 'museum') {
                                graphicsManager.drawRedLine();
                            }
                        }
                    });

                    document.addEventListener('mouseup', () => {
                        if (state.isResizing) {
                            state.isResizing = false;
                            document.body.style.cursor = '';
                            document.body.style.userSelect = '';
                        }
                    });
                },

                handlePanelResize(panelWidth) {
                    if (state.app) {
                        const container = document.querySelector('.canvas-container');
                        if (!container) return;
                        state.app.renderer.resize(container.clientWidth, container.clientHeight);
                        
                        if (state.activeMode === 'museum') {
                            museumManager.drawWorkspace();
                            museumManager.updateAllSkeletonPositions();
                        } else {
                            const oldWidth = state.app.screen.width;
                            const oldHeight = state.app.screen.height;
                            if (oldWidth === 0 || oldHeight === 0) return;
                            let relativeX = state.cameraX / oldWidth;
                            let relativeY = state.cameraY / oldHeight;
                            skeletonManager.updatePosition(
                                state.app.screen.width * relativeX,
                                state.app.screen.height * relativeY
                            );
                            graphicsManager.drawRedLine();
                        }
                    }
                },

                initDragControl() {
                    const canvas = document.getElementById('canvas');
                    canvas.addEventListener('contextmenu', (e) => {
                        if (state.activeMode !== 'museum') {
                            e.preventDefault();
                        }
                    });
                    canvas.addEventListener('mousedown', (e) => {
                        if (state.activeMode === 'museum') return;
                        if (!state.currentSkeleton) return;
                        state.isDragging = true;
                        state.dragStartX = e.clientX;
                        state.dragStartY = e.clientY;
                        state.skeletonStartX = state.cameraX;
                        state.skeletonStartY = state.cameraY;
                        canvas.style.cursor = 'grabbing';
                    });
                    document.addEventListener('mousemove', (e) => {
                        if (!state.isDragging || !state.currentSkeleton) return;
                        const deltaX = e.clientX - state.dragStartX;
                        const deltaY = e.clientY - state.dragStartY;
                        skeletonManager.updatePosition(
                            state.skeletonStartX + deltaX,
                            state.skeletonStartY + deltaY
                        );
                        graphicsManager.drawRedLine();
                    });
                    document.addEventListener('mouseup', () => {
                        if (state.isDragging) {
                            state.isDragging = false;
                            canvas.style.cursor = '';
                        }
                    });
                },

                initScaleControl() {
                    const canvas = document.getElementById('canvas');
                    canvas.addEventListener('wheel', (e) => {
                        e.preventDefault();
                        
                        if (state.activeMode === 'museum') {
                            const factor = e.deltaY > 0 ? 0.9 : 1.1;
                            const newScale = Math.max(0.05, Math.min(2.0, state.museum.cameraScale * factor));
                            
                            const rect = canvas.getBoundingClientRect();
                            const mouseX = e.clientX - rect.left;
                            const mouseY = e.clientY - rect.top;
                            
                            const worldX = (mouseX - state.museum.cameraOffsetX) / state.museum.cameraScale;
                            const worldY = (mouseY - state.museum.cameraOffsetY) / state.museum.cameraScale;
                            
                            state.museum.cameraScale = newScale;
                            
                            state.museum.cameraOffsetX = mouseX - worldX * state.museum.cameraScale;
                            state.museum.cameraOffsetY = mouseY - worldY * state.museum.cameraScale;
                            
                            museumManager.updateAllSkeletonPositions();
                            museumManager.drawWorkspace();
                            uiControls.updateScaleSlider(state.museum.cameraScale);
                        } else {
                            const factor = e.deltaY > 0 ? 0.9 : 1.1;
                            const newScale = Math.round(state.currentScale * factor * 100) / 100;
                            skeletonManager.updateScale(newScale, true);
                        }
                    });
                },

                onWindowResize() {
                    const leftPanel = document.querySelector('.left-panel');
                    this.handlePanelResize(leftPanel.offsetWidth);
                    if (state.activeMode !== 'museum') {
                        graphicsManager.drawRedLine();
                    }
                }
            };

            async function initPixi() {
                state.app = new PIXI.Application();
                const container = document.querySelector('.canvas-container');
                const L = state.themeL != null ? state.themeL : 30;
                const bgHex = (L << 16) | (L << 8) | L;
                await state.app.init({
                    canvas: document.getElementById('canvas'),
                    width: container ? container.clientWidth : (window.innerWidth - 300),
                    height: container ? container.clientHeight : window.innerHeight,
                    backgroundColor: bgHex,
                    antialias: true,
                    resolution: window.devicePixelRatio || 1,
                    autoDensity: true
                });

                const renderer = state.app.renderer;
                const origRendererRender = renderer.render.bind(renderer);
                let lastRenderErrorTime = 0;
                renderer.render = function(options) {
                    try {
                        return origRendererRender(options);
                    } catch (e) {
                        const now = Date.now();
                        if (now - lastRenderErrorTime > 3000) {
                            lastRenderErrorTime = now;
                            showError('Render error: ' + (e && e.message ? e.message : String(e)));
                        }
                    }
                };

                window.addEventListener('error', (e) => {
                    const msg = e && e.error && e.error.message ? e.error.message : (e && e.message ? e.message : '');
                    if (msg) {
                        showError('Uncaught error: ' + msg);
                    }
                });

                window.addEventListener('resize', () => eventHandlers.onWindowResize());
            }

            async function init() {
                themeManager.init();

                await initPixi();

                themeManager.apply(state.themeL);

                state.cameraX = state.app.screen.width / 2;
                state.cameraY = state.app.screen.height / 2;
                state.player.lastTickTime = performance.now();

                const leftPanel = document.querySelector('.left-panel');
                leftPanel.style.width = '300px';

                eventHandlers.initResize();
                eventHandlers.initDragControl();
                eventHandlers.initScaleControl();

                uiControls.initScaleSlider();
                uiControls.initCheckbox();
                uiControls.initPlaceholdersCheckbox();
                uiControls.initZeroAlphaCheckbox();
                uiControls.initSnapCheckbox();
                uiControls.initResetButton();
                uiControls.initTextarea();
                uiControls.initScenarioHeader();
                skinManager.init();
                museumManager.init();

                document.getElementById('errorBlockClose').addEventListener('click', hideError);

                document.getElementById('errorBlockCopy').addEventListener('click', () => {
                    const text = document.getElementById('errorBlockText').textContent || '';
                    if (!text) return;
                    const fallback = (str) => {
                        const ta = document.createElement('textarea');
                        ta.value = str;
                        ta.style.position = 'fixed';
                        ta.style.opacity = '0';
                        document.body.appendChild(ta);
                        ta.select();
                        try { document.execCommand('copy'); } catch (e) {}
                        document.body.removeChild(ta);
                    };
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(text).catch(() => fallback(text));
                    } else {
                        fallback(text);
                    }
                });

                fileHandler.initDragDrop();
                fileHandler.initUploadButton();
                fileHandler.initFolderButton();

                playerManager.init();
                state.app.ticker.add(() => {
                    try {
                        playerManager.onTick();
                    } catch (e) {
                        console.error('Ticker error:', e);
                    }
                });

                graphicsManager.drawRedLine();
                uiControls.updateHighlighting();

                await playlistManager.onTextChange(getScenarioPlainText());
            }

            window.addEventListener('load', init);
        })();
    </script>
</body>
</html>
