                        const skeleton = state.skeletons[name];
                        skeleton.visible = item.visible;
                        if (item.playAll) {
                            this._playAllStep(name);
                        } else {
                            this.setAnimation(name, item.animation);
                        }
                        this.applyCameraTransform(skeleton, item.worldX, item.worldY);
                        skinManager.restoreSkin(name);
                        placeholderManager.setVisible(state.showPlaceholders);
                    }
                    if (changed) {
                        this.applyRenderOrder();
                        this.updateDiamondPosition();
                    }
                },

                toggleAnimationPlay(skeletonName) {
                    const skeleton = state.skeletons[skeletonName];
                    if (!skeleton) return;

                    const item = state.museum.skeletons.find(s => s.skeletonName === skeletonName);
                    if (!item) return;

                    item.isPlaying = !item.isPlaying;
                    skeleton.state.timeScale = item.isPlaying ? 1 : 0;
                },

                toggleVisibility(skeletonName) {
                    const item = state.museum.skeletons.find(s => s.skeletonName === skeletonName);
                    if (!item) return;
                    this.setVisibility(skeletonName, !item.visible);
                    this.renderSkeletonList();
                },

                applyRenderOrder() {
                    for (let i = state.museum.skeletons.length - 1; i >= 0; i--) {
                        const item = state.museum.skeletons[i];
                        const skeleton = state.skeletons[item.skeletonName];
                        if (skeleton && item.visible) {
                            state.app.stage.addChild(skeleton);
                        }
                    }

                    if (state.museum.centerDiamondGraphics) {
                        state.app.stage.addChild(state.museum.centerDiamondGraphics);
                    }

                    for (const label of Object.values(state.museum.hoverLabelObjects)) {
                        if (label.visible) state.app.stage.addChild(label);
                    }
                },

                renderSkeletonList() {
                    const container = document.getElementById('museumList');
                    container.innerHTML = '';
                    const selectedSet = new Set(state.museum.selectedSkeletons);

                    state.museum.skeletons.forEach((item, index) => {
                        const div = document.createElement('div');
                        div.className = 'museum-item' + (selectedSet.has(item.skeletonName) ? ' selected' : '');
                        div.dataset.index = index;
                        div.dataset.skeletonName = item.skeletonName;

                        const dragHandle = document.createElement('div');
                        dragHandle.className = 'museum-drag-handle';
                        dragHandle.textContent = '≡';
                        dragHandle.draggable = true;

                        const visibilityBtn = document.createElement('button');
                        visibilityBtn.className = 'museum-visibility-btn' + (item.visible ? ' visible' : '');
                        visibilityBtn.textContent = item.visible ? '●' : '○';
                        visibilityBtn.dataset.skeletonName = item.skeletonName;

                        const nameSpan = document.createElement('div');
                        nameSpan.className = 'museum-name';
                        nameSpan.textContent = item.skeletonName;
                        nameSpan.dataset.skeletonName = item.skeletonName;

                        div.appendChild(dragHandle);
                        div.appendChild(visibilityBtn);
                        div.appendChild(nameSpan);
                        container.appendChild(div);

                        visibilityBtn.addEventListener('mousedown', (e) => {
                            e.preventDefault();
                            this.startVisibilityPaint(item.skeletonName);
                        });
                        visibilityBtn.addEventListener('mouseenter', () => {
                            if (state.museum.visibilityPainting) {
                                this.paintVisibility(item.skeletonName, visibilityBtn);
                            }
                        });

                        nameSpan.addEventListener('click', () => this.selectSkeleton(item.skeletonName));

                        this.setupDragAndDrop(div, index);
                    });
                },

                updateVisibilityButton(btn, visible) {
                    btn.textContent = visible ? '●' : '○';
                    btn.classList.toggle('visible', visible);
                },

                setVisibility(skeletonName, visible, btn) {
                    const item = state.museum.skeletons.find(s => s.skeletonName === skeletonName);
                    if (!item || item.visible === visible) return false;

                    item.visible = visible;
                    const skeleton = state.skeletons[skeletonName];
                    if (skeleton) {
                        skeleton.visible = visible;
                    }

                    if (!visible) {
                        state.museum.selectedSkeletons = state.museum.selectedSkeletons.filter(n => n !== skeletonName);
                    }

                    if (btn) this.updateVisibilityButton(btn, visible);

                    this.updateDiamondPosition();
                    this.updateSelectedInfo();
                    return true;
                },

                startVisibilityPaint(skeletonName) {
                    const item = state.museum.skeletons.find(s => s.skeletonName === skeletonName);
                    if (!item) return;
                    const newVisible = !item.visible;
                    state.museum.visibilityPainting = true;
                    state.museum.visibilityPaintTarget = newVisible;

                    const btn = document.querySelector('.museum-visibility-btn[data-skeleton-name="' + CSS.escape(skeletonName) + '"]');
                    this.setVisibility(skeletonName, newVisible, btn);
                },

                paintVisibility(skeletonName, btn) {
                    this.setVisibility(skeletonName, state.museum.visibilityPaintTarget, btn);
                },

                endVisibilityPaint() {
                    state.museum.visibilityPainting = false;
                    state.museum.visibilityPaintTarget = null;
                },

                selectSkeleton(skeletonName) {
                    state.museum.selectedSkeletons = [skeletonName];
                    this.updateDiamondPosition();
                    this.updateSelectedInfo();
                    this.updateListSelection();
                },

                updateListSelection() {
                    const selectedSet = new Set(state.museum.selectedSkeletons);
                    const items = document.querySelectorAll('#museumList .museum-item');
                    items.forEach(el => {
                        const name = el.dataset.skeletonName;
                        el.classList.toggle('selected', !!name && selectedSet.has(name));
                    });
                },

                buildSelectedAnimationDropdown() {
                    const container = document.getElementById('selectedAnimationDropdown');
                    if (!container) return;
                    container.innerHTML = '';
                    container.classList.remove('open');

                    const selected = state.museum.selectedSkeletons;
                    if (selected.length === 0) return;

                    const first = state.skeletons[selected[0]];
                    if (!first || !first.skeleton || !first.skeleton.data) return;
                    const animations = first.skeleton.data.animations || [];
                    if (animations.length === 0) return;

                    const items = selected
                        .map(n => state.museum.skeletons.find(s => s.skeletonName === n))
                        .filter(Boolean);
                    const allSameAnim = items.length > 0 && items.every(i => i.animation === items[0].animation);
                    const currentAnim = allSameAnim ? items[0].animation : '';

                    const trigger = document.createElement('div');
                    trigger.className = 'museum-animation-trigger';
                    const labelSpan = document.createElement('span');
                    labelSpan.textContent = currentAnim || '—';
                    const arrow = document.createElement('span');
                    arrow.className = 'arrow';
                    arrow.textContent = '▼';
                    trigger.appendChild(labelSpan);
                    trigger.appendChild(arrow);

                    const list = document.createElement('div');
                    list.className = 'museum-animation-list';

                    animations.sort((a, b) => a.name.localeCompare(b.name)).forEach(anim => {
                        const animItem = document.createElement('div');
                        animItem.className = 'museum-animation-item' + (allSameAnim && anim.name === currentAnim ? ' active' : '');
                        animItem.textContent = anim.name;

                        animItem.addEventListener('click', (e) => {
                            e.stopPropagation();
                            for (const name of selected) {
                                const item = state.museum.skeletons.find(s => s.skeletonName === name);
                                if (!item) continue;
                                this.stopPlayAll(name);
                                item.animation = anim.name;
                                item.isPlaying = true;
                                this.setAnimation(name, anim.name);
                                const sk = state.skeletons[name];
                                if (sk) sk.state.timeScale = 1;
                            }
                            container.classList.remove('open');
                            this.buildSelectedAnimationDropdown();
                            this.updateSelectedPlaybackButtons();
                            this.renderSkeletonList();
                        });

                        list.appendChild(animItem);
                    });

                    trigger.addEventListener('click', () => {
                        container.classList.toggle('open');
                        this.closeOtherDropdowns(container);
                    });

                    container.appendChild(trigger);
                    container.appendChild(list);
                },

                playSelected() {
                    for (const name of state.museum.selectedSkeletons) {
                        const item = state.museum.skeletons.find(s => s.skeletonName === name);
                        const sk = state.skeletons[name];
                        if (!item || !sk) continue;
                        item.isPlaying = true;
                        sk.state.timeScale = 1;
                    }
                    this.updateSelectedPlaybackButtons();
                },

                pauseSelected() {
                    for (const name of state.museum.selectedSkeletons) {
                        const item = state.museum.skeletons.find(s => s.skeletonName === name);
                        const sk = state.skeletons[name];
                        if (!item || !sk) continue;
                        item.isPlaying = false;
                        sk.state.timeScale = 0;
                    }
                    this.updateSelectedPlaybackButtons();
                },

                stopSelected() {
                    for (const name of state.museum.selectedSkeletons) {
                        const item = state.museum.skeletons.find(s => s.skeletonName === name);
                        const sk = state.skeletons[name];
                        if (!item || !sk) continue;
                        this.stopPlayAll(name);
                        item.isPlaying = false;
                        this.setAnimation(name, item.animation);
                        sk.state.timeScale = 0;
                    }
                    this.updateSelectedPlaybackButtons();
                },

                togglePlayPauseSelected() {
                    const items = state.museum.selectedSkeletons
                        .map(n => state.museum.skeletons.find(s => s.skeletonName === n))
                        .filter(Boolean);
                    if (items.length === 0) return;
                    const allPlaying = items.every(i => i.isPlaying);
                    if (allPlaying) {
                        this.pauseSelected();
                    } else {
                        this.playSelected();
                    }
                },

                getSortedAnimations(skeletonName) {
                    const sk = state.skeletons[skeletonName];
                    if (!sk || !sk.skeleton || !sk.skeleton.data) return [];
                    return (sk.skeleton.data.animations || []).slice().sort((a, b) => a.name.localeCompare(b.name));
                },

                togglePlayAllSelected() {
                    const items = state.museum.selectedSkeletons
                        .map(n => state.museum.skeletons.find(s => s.skeletonName === n))
                        .filter(Boolean);
                    if (items.length === 0) return;
                    const anyOn = items.some(i => i.playAll);
                    if (anyOn) {
                        for (const item of items) {
                            this.stopPlayAll(item.skeletonName);
                        }
                    } else {
                        for (const item of items) {
                            this.startPlayAll(item.skeletonName);
                        }
                    }
                    this.updateSelectedPlaybackButtons();
                },

                startPlayAll(skeletonName) {
                    const sk = state.skeletons[skeletonName];
                    if (!sk) return;
                    const item = state.museum.skeletons.find(s => s.skeletonName === skeletonName);
                    if (!item) return;
                    item.playAll = true;
                    item.playAllIndex = 0;
                    item.isPlaying = true;
                    this._playAllStep(skeletonName);
                },

                _playAllStep(skeletonName) {
                    const sk = state.skeletons[skeletonName];
                    if (!sk || !sk.state) return;
                    const item = state.museum.skeletons.find(s => s.skeletonName === skeletonName);
                    if (!item || !item.playAll) return;
                    const animations = this.getSortedAnimations(skeletonName);
                    if (animations.length === 0) return;
                    if (item.playAllIndex >= animations.length) item.playAllIndex = 0;
                    const animName = animations[item.playAllIndex].name;
                    item.animation = animName;
                    const track = sk.state.setAnimation(0, animName, false);
                    if (track) {
                        track.timeScale = item.isPlaying ? 1 : 0;
                        track.listener = {
                            complete: () => {
                                if (!item.playAll) return;
                                item.playAllIndex = (item.playAllIndex + 1) % animations.length;
                                this._playAllStep(skeletonName);
                            }
                        };
                    }
                    if (state.museum.selectedSkeletons.includes(skeletonName)) {
                        this.buildSelectedAnimationDropdown();
                    }
                },

                stopPlayAll(skeletonName) {
                    const item = state.museum.skeletons.find(s => s.skeletonName === skeletonName);
                    if (!item) return;
                    if (!item.playAll) return;
                    item.playAll = false;
                    const sk = state.skeletons[skeletonName];
                    if (sk && sk.state) {
                        const track = sk.state.getCurrent(0);
                        if (track) {
                            track.listener = null;
                            track.loop = true;
                        }
                    }
                },

                updateSelectedPlaybackButtons() {
                    this.updateSelectedPositionSlider();
                    const playPauseBtn = document.getElementById('museumPlayPauseBtn');
                    const playAllBtn = document.getElementById('museumPlayAllBtn');
                    const selected = state.museum.selectedSkeletons;
                    const items = selected
                        .map(n => state.museum.skeletons.find(s => s.skeletonName === n))
                        .filter(Boolean);
                    if (items.length === 0) {
                        if (playPauseBtn) {
                            playPauseBtn.title = 'Play';
                            playPauseBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 21,12 6,21"/></svg>';
                        }
                        if (playAllBtn) playAllBtn.classList.remove('active');
                        return;
                    }
                    const allPlaying = items.every(i => i.isPlaying);
                    if (playPauseBtn) {
                        if (allPlaying) {
                            playPauseBtn.title = 'Pause';
                            playPauseBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>';
                        } else {
                            playPauseBtn.title = 'Play';
                            playPauseBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 21,12 6,21"/></svg>';
                        }
                    }
                    const allPlayAll = items.every(i => i.playAll);
                    if (playAllBtn) playAllBtn.classList.toggle('active', allPlayAll);
                },

                seekSelected(ratio) {
                    for (const name of state.museum.selectedSkeletons) {
                        const sk = state.skeletons[name];
                        if (!sk || !sk.state) continue;
                        const track = sk.state.getCurrent(0);
                        if (!track || !track.animation) continue;
                        const dur = track.animation.duration;
                        if (dur <= 0) continue;
                        track.trackTime = ratio * dur;
                    }
                },

                updateSelectedPositionSlider() {
                    const slider = document.getElementById('selectedPositionSlider');
                    if (!slider) return;
                    if (this._selectedSeeking) return;
                    const selected = state.museum.selectedSkeletons;
                    if (selected.length === 0) {
                        slider.disabled = true;
                        slider.value = 0;
                        return;
                    }
                    const sk = state.skeletons[selected[0]];
                    const track = sk && sk.state ? sk.state.getCurrent(0) : null;
                    const dur = track && track.animation ? track.animation.duration : 0;
                    if (dur <= 0) {
                        slider.disabled = true;
                        slider.value = 0;
                        return;
                    }
                    slider.disabled = false;
                    let ratio;
                    if (track.loop) {
                        ratio = (track.trackTime % dur) / dur;
                    } else {
                        ratio = Math.min(track.trackTime / dur, 1);
                    }
                    slider.value = Math.round(ratio * 1000);
                },

                closeOtherDropdowns(exceptDropdown) {
                    const dropdowns = document.querySelectorAll('.museum-animation-dropdown');
                    dropdowns.forEach(dd => {
                        if (dd !== exceptDropdown) {
                            dd.classList.remove('open');
                        }
                    });
                },

                setupDragAndDrop(element, index) {
                    const dragHandle = element.querySelector('.museum-drag-handle');

                    dragHandle.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/plain', index);
                        element.classList.add('dragging');
                    });

                    dragHandle.addEventListener('dragend', () => {
                        element.classList.remove('dragging');
                        document.querySelectorAll('.museum-item').forEach(el => {
                            el.classList.remove('drag-over');
                        });
                    });

                    element.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        const draggingIndex = parseInt(e.dataTransfer.getData('text/plain'));
                        if (draggingIndex === index) return;

                        element.classList.add('drag-over');
                    });

                    element.addEventListener('dragleave', () => {
                        element.classList.remove('drag-over');
                    });

                    element.addEventListener('drop', (e) => {
                        e.preventDefault();
                        element.classList.remove('drag-over');

                        const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                        if (fromIndex === index || isNaN(fromIndex)) return;

                        const [movedItem] = state.museum.skeletons.splice(fromIndex, 1);
                        state.museum.skeletons.splice(index, 0, movedItem);

                        this.renderSkeletonList();
                        this.applyRenderOrder();
                    });
                },

                hasAnimation(skeletonName, animationName) {
                    if (!animationName) return false;
                    const skeleton = state.skeletons[skeletonName];
                    if (!skeleton || !skeleton.skeleton || !skeleton.skeleton.data) return false;
                    const animations = skeleton.skeleton.data.animations || [];
                    return animations.some(a => a.name === animationName);
                },

                getCurrentTrackTime(skeletonName) {
                    const sk = state.skeletons[skeletonName];
                    if (!sk || !sk.state) return 0;
                    const track = sk.state.getCurrent(0);
                    if (!track || !track.animation) return 0;
                    const dur = track.animation.duration || 0;
                    if (dur > 0) return track.trackTime % dur;
                    return track.trackTime;
                },

                serializeState() {
                    const skeletons = state.museum.skeletons.map(item => {
                        const x = Math.round(item.worldX);
                        const y = Math.round(item.worldY);
                        const anim = item.animation || '';
                        const playing = item.isPlaying ? 1 : 0;
                        const t = this.getCurrentTrackTime(item.skeletonName);
                        const visible = item.visible ? 1 : 0;
                        return `${item.skeletonName}:${x},${y}:${anim}:${playing}:${t.toFixed(3)}:${visible}`;
                    }).join('|');
                    
                    const skeletonOrder = state.museum.skeletons.map(item => item.skeletonName).join(',');
                    
                    const stateObj = {
                        skeletons: skeletons,
                        skeletonOrder: skeletonOrder,
                        cameraOffsetX: state.museum.cameraOffsetX,
                        cameraOffsetY: state.museum.cameraOffsetY,
                        cameraScale: state.museum.cameraScale,
                        snapToGrid: state.museum.snapToGrid
                    };
                    
                    return JSON.stringify(stateObj);
                },

                parseStateText(text) {
                    const result = {};
                    let skeletonOrder = [];
                    let cameraState = {};
                    
                    if (text) {
                        try {
                            const trimmed = text.trim();
                            if (trimmed.startsWith('{')) {
                                console.log('Parsing museum state (JSON format):', text);
                                const stateObj = JSON.parse(text);
                                
                                if (stateObj.skeletons) {
                                    stateObj.skeletons.split('|').forEach(part => {
                                        part = part.trim();
                                        if (!part) return;
                                        const fields = part.split(':');
                                        const name = fields[0];
                                        if (!name) return;
                                        const coords = (fields[1] || '').split(',');
                                        const x = parseInt(coords[0], 10);
                                        const y = parseInt(coords[1], 10);
                                        if (isNaN(x) || isNaN(y)) return;
                                        const entry = { x: x, y: y };
                                        if (fields.length > 2 && fields[2] !== '') entry.animation = fields[2];
                                        if (fields.length > 3 && fields[3] !== '') entry.isPlaying = fields[3] === '1';
                                        if (fields.length > 4 && fields[4] !== '') {
                                            const tt = parseFloat(fields[4]);
                                            if (!isNaN(tt)) entry.trackTime = tt;
                                        }
                                        if (fields.length > 5 && fields[5] !== '') entry.visible = fields[5] === '1';
                                        result[name] = entry;
                                    });
                                }
                                
                                if (stateObj.skeletonOrder) {
                                    skeletonOrder = stateObj.skeletonOrder.split(',');
                                }
                                
                                if (stateObj.cameraOffsetX !== undefined) cameraState.cameraOffsetX = stateObj.cameraOffsetX;
                                if (stateObj.cameraOffsetY !== undefined) cameraState.cameraOffsetY = stateObj.cameraOffsetY;
                                if (stateObj.cameraScale !== undefined) cameraState.cameraScale = stateObj.cameraScale;
                                if (stateObj.snapToGrid !== undefined) cameraState.snapToGrid = stateObj.snapToGrid;
                                
                                console.log('Parsed museum state:', { skeletonStates: result, skeletonOrder, cameraState });
                            } else {
                                console.log('Parsing museum state (legacy format):', text);
                                text.split('|').forEach(part => {
                                    part = part.trim();
                                    if (!part) return;
                                    const fields = part.split(':');
                                    const name = fields[0];
                                    if (!name) return;
                                    const coords = (fields[1] || '').split(',');
                                    const x = parseInt(coords[0], 10);
                                    const y = parseInt(coords[1], 10);
                                    if (isNaN(x) || isNaN(y)) return;
                                    const entry = { x: x, y: y };
                                    if (fields.length > 2 && fields[2] !== '') entry.animation = fields[2];
                                    if (fields.length > 3 && fields[3] !== '') entry.isPlaying = fields[3] === '1';
                                    if (fields.length > 4 && fields[4] !== '') {
                                        const tt = parseFloat(fields[4]);
                                        if (!isNaN(tt)) entry.trackTime = tt;
                                    }
                                    result[name] = entry;
                                });
                                console.log('Parsed museum state (legacy):', { skeletonStates: result });
                            }
                        } catch (e) {
                            console.error('Failed to parse museum state:', e);
                        }
                    }
                    
                    return { skeletonStates: result, skeletonOrder, cameraState };
                },

                applyStateMap(stateData) {
                    const stateMap = stateData.skeletonStates || {};
                    
                    for (const name of Object.keys(stateMap)) {
                        const item = state.museum.skeletons.find(s => s.skeletonName === name);
                        if (!item) continue;

                        const saved = stateMap[name];
                        item.worldX = saved.x;
                        item.worldY = saved.y;

                        if (saved.visible !== undefined) {
                            item.visible = saved.visible;
                        }

                        const skeleton = state.skeletons[name];
                        if (!skeleton) continue;

                        if (saved.animation !== undefined && this.hasAnimation(name, saved.animation)) {
                            item.animation = saved.animation;
                            this.setAnimation(name, item.animation);
                        }
                        this.applyCameraTransform(skeleton, item.worldX, item.worldY);
                        skeleton.visible = item.visible;

                        if (saved.isPlaying !== undefined) {
                            item.isPlaying = saved.isPlaying;
                        }
                        skeleton.state.timeScale = item.isPlaying ? 1 : 0;

                        if (saved.trackTime !== undefined) {
                            const track = skeleton.state.getCurrent(0);
                            if (track) {
                                const dur = track.animation ? track.animation.duration : 0;
                                let tt = saved.trackTime;
                                if (dur > 0 && tt > dur) tt = tt % dur;
                                if (tt < 0) tt = 0;
                                track.trackTime = tt;
                            }
                        }
                    }

                    if (stateData.skeletonOrder && stateData.skeletonOrder.length > 0) {
                        state.museum.skeletons.sort((a, b) => {
                            const indexA = stateData.skeletonOrder.indexOf(a.skeletonName);
                            const indexB = stateData.skeletonOrder.indexOf(b.skeletonName);
                            return indexA - indexB;
                        });
                    }

                    if (stateData.cameraState) {
                        if (stateData.cameraState.cameraOffsetX !== undefined) {
                            state.museum.cameraOffsetX = stateData.cameraState.cameraOffsetX;
                        }
                        if (stateData.cameraState.cameraOffsetY !== undefined) {
                            state.museum.cameraOffsetY = stateData.cameraState.cameraOffsetY;
                        }
                        if (stateData.cameraState.cameraScale !== undefined) {
                            state.museum.cameraScale = stateData.cameraState.cameraScale;
                        }
                        if (stateData.cameraState.snapToGrid !== undefined) {
                            state.museum.snapToGrid = stateData.cameraState.snapToGrid;
                        }
                        this.drawWorkspace();
                    }

                    this.updateDiamondPosition();
                    this.updateSelectedInfo();
                },

                resetMuseumState() {
                    state.museum.skeletons = [];
                    state.museum.selectedSkeletons = [];
                    this.setupMuseumView();
                },

                initResetButton() {
                    const btn = document.getElementById('museumResetBtn');
                    if (btn) btn.addEventListener('click', () => this.resetMuseumState());
                },

                copyPositions() {
                    const text = this.serializeState();

                    const fallback = (str) => {
                        const ta = document.createElement('textarea');
                        ta.value = str;
                        ta.style.position = 'fixed';
                        ta.style.opacity = '0';
                        document.body.appendChild(ta);
                        ta.select();
                        try { document.execCommand('copy'); } catch (e) {}
                        document.body.removeChild(ta);
                    };

                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(text).catch(() => fallback(text));
                    } else {
                        fallback(text);
                    }
                },

                parsePositions(text) {
                    const stateMap = this.parseStateText(text);
                    this.applyStateMap(stateMap);
                },

                exitMuseum() {
                    if (state.activeMode !== 'museum') return;

                    state.museum.skeletons.forEach(item => {
                        const skeleton = state.skeletons[item.skeletonName];
                        if (skeleton) {
                            skeleton.state.clearTracks();
                            if (skeleton.parent) {
                                skeleton.parent.removeChild(skeleton);
                            }
                        }
                    });

                    if (state.museum.workspaceGraphics && state.museum.workspaceGraphics.parent) {
                        state.museum.workspaceGraphics.parent.removeChild(state.museum.workspaceGraphics);
                    }

                    if (state.museum.centerDiamondGraphics && state.museum.centerDiamondGraphics.parent) {
                        state.museum.centerDiamondGraphics.parent.removeChild(state.museum.centerDiamondGraphics);
                    }

                    if (state.museum.selectionGraphics && state.museum.selectionGraphics.parent) {
                        state.museum.selectionGraphics.parent.removeChild(state.museum.selectionGraphics);
                    }

                    for (const label of Object.values(state.museum.hoverLabelObjects)) {
                        if (label.parent) label.parent.removeChild(label);
                        label.destroy();
                    }
                    state.museum.hoverLabelObjects = {};

                    state.museum.selectedSkeletons = [];
                    state.museum.isSelecting = false;

                    const rightArea = document.querySelector('.right-area');
                    rightArea.classList.remove('museum-mode');
                }
            };

            const skinManager = {
                readSkins(skeletonName) {
                    const sk = state.skeletons[skeletonName];
                    if (!sk || !sk.skeleton || !sk.skeleton.data) return [];
                    const skins = sk.skeleton.data.skins;
                    if (!skins) return [];
                    return skins.map(s => s.name);
                },

                updateDropdown(skeletonName) {
                    const section = document.getElementById('skinSection');
                    const select = document.getElementById('skinSelect');
                    if (!section || !select) return;

                    const skins = state.availableSkins[skeletonName] || [];
                    const nonDefaultSkins = skins.filter(s => s !== 'default');

                    if (nonDefaultSkins.length === 0) {
                        section.classList.remove('visible');
                        return;
                    }

                    select.innerHTML = '';
                    skins.forEach(skinName => {
                        const opt = document.createElement('option');
                        opt.value = skinName;
                        opt.textContent = skinName;
                        select.appendChild(opt);
                    });

                    const saved = state.selectedSkins[skeletonName] || 'default';
                    select.value = saved;
                    section.classList.add('visible');
                },

                applySkin(skeletonName, skinName) {
                    const sk = state.skeletons[skeletonName];
                    if (!sk || !sk.skeleton) return;
                    sk.skeleton.setSkinByName(skinName);
                    sk.skeleton.setSlotsToSetupPose();
                    state.selectedSkins[skeletonName] = skinName;
                },

                restoreSkin(skeletonName) {
                    const skinName = state.selectedSkins[skeletonName];
                    if (!skinName || skinName === 'default') return;
                    const skins = state.availableSkins[skeletonName] || [];
                    if (skins.includes(skinName)) {
                        this.applySkin(skeletonName, skinName);
                    }
                },

                init() {
                    const select = document.getElementById('skinSelect');
                    if (!select) return;
                    select.addEventListener('change', (e) => {
                        if (state.currentSkeletonName) {
                            this.applySkin(state.currentSkeletonName, e.target.value);
                        }
                    });
                }
            };

            const graphicsManager = {
                GRID_FINE: 100,
                GRID_COARSE: 500,
                GRID_FINE_ALPHA: 0.02,
                GRID_COARSE_ALPHA: 0.05,
                AXES_WIDTH: 2,
                AXES_ALPHA: 0.1,

                getLineColor() {
                    return state.themeFg === 0 ? 0x000001 : 0xfffffe;
                },

                drawGridLayer(graphics, lineColor, alpha, gridSize, scale, offsetX, offsetY, screenW, screenH) {
                    graphics.setStrokeStyle({ width: 1, color: lineColor, alpha: alpha });

                    const startX = -offsetX / scale;
                    const endX = (screenW - offsetX) / scale;
                    const startY = -offsetY / scale;
                    const endY = (screenH - offsetY) / scale;

                    const firstGridX = Math.floor(startX / gridSize) * gridSize;
                    const firstGridY = Math.floor(startY / gridSize) * gridSize;

                    for (let x = firstGridX; x <= endX; x += gridSize) {
                        const screenX = x * scale + offsetX;
                        graphics.moveTo(screenX, 0);
                        graphics.lineTo(screenX, screenH);
                    }

                    for (let y = firstGridY; y <= endY; y += gridSize) {
                        const screenY = y * scale + offsetY;
                        graphics.moveTo(0, screenY);
                        graphics.lineTo(screenW, screenY);
                    }

                    graphics.stroke();
                },

                drawAxesAndGrid(graphics, scale, offsetX, offsetY) {
                    if (!graphics || !state.app) return;
                    graphics.clear();

                    const lineColor = this.getLineColor();
                    const screenW = state.app.screen.width;
                    const screenH = state.app.screen.height;

                    this.drawGridLayer(graphics, lineColor, this.GRID_FINE_ALPHA, this.GRID_FINE, scale, offsetX, offsetY, screenW, screenH);
                    this.drawGridLayer(graphics, lineColor, this.GRID_COARSE_ALPHA, this.GRID_COARSE, scale, offsetX, offsetY, screenW, screenH);

                    graphics.setStrokeStyle({ width: this.AXES_WIDTH, color: lineColor, alpha: this.AXES_ALPHA });

                    if (offsetX >= 0 && offsetX <= screenW) {
                        graphics.moveTo(offsetX, 0);
                        graphics.lineTo(offsetX, screenH);
                    }
                    if (offsetY >= 0 && offsetY <= screenH) {
                        graphics.moveTo(0, offsetY);
                        graphics.lineTo(screenW, offsetY);
                    }

                    graphics.stroke();
                },

                drawRedLine() {
                    if (!state.redLineGraphics) {
                        state.redLineGraphics = new PIXI.Graphics();
                    }
                    if (state.redLineGraphics.parent !== state.app.stage) {
                        state.app.stage.addChildAt(state.redLineGraphics, 0);
                    }
                    this.drawAxesAndGrid(state.redLineGraphics, state.currentScale, state.cameraX, state.cameraY);
                }
            };

            const themeManager = {
                STORAGE_KEY: 'spineViewerThemeLuminance',
                DEFAULT_L: 30,

                getStoredL() {
                    let raw = null;
                    try { raw = localStorage.getItem(this.STORAGE_KEY); } catch (e) {}
                    if (raw === null || raw === undefined) return this.DEFAULT_L;
                    const v = parseInt(raw, 10);
                    if (isNaN(v)) return this.DEFAULT_L;
                    return Math.max(0, Math.min(255, v));
                },

                apply(L) {
                    L = Math.max(0, Math.min(255, Math.round(L)));
                    const fg = L < 128 ? 255 : 0;
                    const rs = document.documentElement.style;
                    rs.setProperty('--bg-rgb', L + ',' + L + ',' + L);
                    rs.setProperty('--fg-rgb', fg + ',' + fg + ',' + fg);
                    applyErrorColors(rs, L);
                    state.themeL = L;
                    state.themeFg = fg;
                    if (state.app && state.app.renderer && state.app.renderer.background && state.app.renderer.background.color) {
                        const hex = (L << 16) | (L << 8) | L;
                        try { state.app.renderer.background.color.setValue(hex); } catch (e) {}
                    }
                    if (state.activeMode === 'museum') {
                        museumManager.drawWorkspace();
                    } else if (state.redLineGraphics) {
                        graphicsManager.drawRedLine();
                    }
                },

                init() {
                    const slider = document.getElementById('themeSlider');
                    const L = this.getStoredL();
                    if (slider) {
                        slider.value = L;
                        slider.addEventListener('input', (e) => {
                            const v = parseInt(e.target.value, 10);
                            this.apply(v);
                            try { localStorage.setItem(this.STORAGE_KEY, String(v)); } catch (err) {}
                        });
                    }
                    this.apply(L);
                }
            };

            function slotCollectRenderables(instructionSet, renderer) {
                if (!state.showPlaceholders) return;
                if (!this || this.destroyed) return;
                if (!this.renderPipeId || !renderer || !renderer.renderPipes) return;
                const { renderPipes, renderableGC } = renderer;
                const pipe = renderPipes[this.renderPipeId];
                if (!pipe) return;
                try {
                    renderPipes.blendMode.setBlendMode(this, this.groupBlendMode, instructionSet);
                    this.didViewUpdate = false;
                    pipe.addRenderable(this, instructionSet);
                    renderableGC.addRenderable(this, instructionSet);
                } catch (e) {}
            }

            const placeholderManager = {
                PREFIX: 'placeholder-',
                FONT_SIZE: 60,
                entries: {},

                buildFor(skeletonName) {
                    this.clearFor(skeletonName);
                    const sk = state.skeletons[skeletonName];
                    if (!sk || !sk.skeleton || !sk.addSlotObject) return;
                    const slots = sk.skeleton.slots || [];
                    const items = [];
                    for (let i = 0; i < slots.length; i++) {
                        const slot = slots[i];
                        const name = slot.data && slot.data.name;
                        if (!name || name.indexOf(this.PREFIX) !== 0) continue;
                        const text = new PIXI.Text({
                            text: name,
                            style: {
                                fontFamily: 'Arial',
                                fontSize: this.FONT_SIZE,
                                fill: 0xffffff,
                                stroke: { color: 0x000000, width: 3, join: 'round' },
                                align: 'center'
                            }
                        });
                        text.anchor.set(0.5, 0.5);
                        text.renderable = state.showPlaceholders;
                        text.collectRenderables = slotCollectRenderables;
                        sk.addSlotObject(name, text);
                        items.push({ slot: slot, text: text });
                    }
                    this.entries[skeletonName] = { spine: sk, items: items };
                    sk.afterUpdateWorldTransforms = () => {
                        this.applyColor(skeletonName);
                    };
                    this.applyColor(skeletonName);
                },

                clearFor(skeletonName) {
                    const entry = this.entries[skeletonName];
                    if (entry) {
                        const sk = entry.spine;
                        if (sk && !sk.destroyed && sk.skeleton) {
                            sk.afterUpdateWorldTransforms = () => {};
                        }
                        for (let i = 0; i < entry.items.length; i++) {
                            const it = entry.items[i];
                            if (sk && !sk.destroyed && sk.removeSlotObject) {
                                try { sk.removeSlotObject(it.slot); } catch (e) {}
                            }
                            if (it.text && !it.text.destroyed) it.text.destroy({ children: true });
                        }
                    }
                    delete this.entries[skeletonName];
                },

                resetAll() {
                    Object.keys(this.entries).forEach(name => this.clearFor(name));
                },

                setVisible(visible) {
                    Object.keys(this.entries).forEach(skeletonName => {
                        const entry = this.entries[skeletonName];
                        for (let i = 0; i < entry.items.length; i++) {
                            const it = entry.items[i];
                            if (it.text && !it.text.destroyed) it.text.renderable = visible;
                        }
                    });
                },

                applyColor(skeletonName) {
                    const entry = this.entries[skeletonName];
                    if (!entry) return;
                    if (!state.showPlaceholders) return;
                    for (let i = 0; i < entry.items.length; i++) {
                        const it = entry.items[i];
                        const c = it.slot.color;
                        if (!c || !it.text || it.text.destroyed) continue;
                        const r = Math.round(c.r * 255);
                        const g = Math.round(c.g * 255);
                        const b = Math.round(c.b * 255);
                        it.text.tint = (r << 16) | (g << 8) | b;
                    }
                },

                detectZeroAlpha(skeletonName) {
                    const sk = state.skeletons[skeletonName];
                    if (!sk || !sk.skeleton || !sk.skeleton.data) return [];
                    const data = sk.skeleton.data;
                    const slotsData = data.slots || [];
                    const placeholderSlots = {};
                    for (let i = 0; i < slotsData.length; i++) {
                        const name = slotsData[i].name;
                        if (name && name.indexOf(this.PREFIX) === 0) {
                            placeholderSlots[i] = name;
                        }
                    }
                    if (Object.keys(placeholderSlots).length === 0) return [];

                    const PROP_ALPHA = '9';
                    const animations = data.animations || [];
                    const warnings = [];
                    for (let a = 0; a < animations.length; a++) {
                        const anim = animations[a];
                        const timelines = anim.timelines || [];
                        for (let t = 0; t < timelines.length; t++) {
                            const timeline = timelines[t];
                            const propIds = timeline.getPropertyIds ? timeline.getPropertyIds() : timeline.propertyIds;
                            if (!propIds) continue;
                            let slotIndex = -1;
                            for (let p = 0; p < propIds.length; p++) {
                                const pid = String(propIds[p]);
                                const sep = pid.indexOf('|');
                                if (sep < 0) continue;
                                if (pid.substring(0, sep) !== PROP_ALPHA) continue;
                                const idx = parseInt(pid.substring(sep + 1), 10);
                                if (placeholderSlots[idx] !== undefined) { slotIndex = idx; break; }
                            }
                            if (slotIndex < 0) continue;
                            const entries = timeline.getFrameEntries();
                            const frameCount = timeline.getFrameCount();
                            const alphaOffset = entries === 2 ? 1 : 4;
                            const times = [];
                            for (let f = 0; f < frameCount; f++) {
                                const base = f * entries;
                                if (timeline.frames[base + alphaOffset] === 0) {
                                    times.push(Math.round(timeline.frames[base] * 30));
                                }
                            }
                            if (times.length > 0) {
                                warnings.push('[' + skeletonName + '] "' + placeholderSlots[slotIndex] + '" in "' + anim.name + '": 0 alpha at frames: ' + times.join(', '));
                            }
                        }
                    }
                    return warnings;
                }
            };

            const playlistManager = {
                parse(text) {
                    return text
                        .split('\n')
                        .map(line => line.trim())
                        .filter(line => line.length > 0 && line.includes('|'))
                        .map(line => {
                            const [skeletonName, animationName] = line.split('|').map(s => s.trim());
                            return { skeletonName, animationName };
                        });
                },

                playAnimation(skeletonName, animationName, loop) {
                    if (!state.loadedSkeletons.has(skeletonName)) return;

                    const resolution = getEffectiveResolution(skeletonName, animationName);
                    skeletonManager.switchTo(skeletonName, resolution);

                    const trackEntry = state.currentSkeleton.state.setAnimation(0, animationName, loop);
                    return trackEntry;
                },

                async playAtIndex(index) {
                    if (index >= state.playlist.length) {
                        if (!state.player.loop) {
                            state.player.playing = false;
                            playerManager.updatePlayPauseButton();
                            return;
                        }
                        index = 0;
                    }

                    if (state.playlist.length === 0) return;

                    const item = state.playlist[index];
                    if (!state.loadedSkeletons.has(item.skeletonName)) return;

                    state.currentIndex = index;
                    playerManager.resetPhase();
                    uiControls.updateHighlighting();

                    const gen = state.scenarioGeneration;
                    const trackEntry = this.playAnimation(item.skeletonName, item.animationName, false);

                    uiControls.updateInfoOverlay();

                    if (trackEntry) {
                        if (state.player.pauseBefore) {
                            playerManager.startPauseBefore();
                        }

                        trackEntry.listener = {
                            complete: () => {
                                if (state.scenarioGeneration === gen && state.activeMode === 'scenario') {
                                    if (state.player.pauseAfter) {
                                        playerManager.startPauseAfter(() => {
                                            this.playAtIndex(index + 1);
                                        });
                                    } else {
                                        this.playAtIndex(index + 1);
                                    }
                                }
                            }
                        };
                    }
                },

                playSingleAnimation(skeletonName, animationName) {
                    state.scenarioGeneration++;
                    state.activeMode = 'animation';
                    state.activeAnimation = { skeletonName, animationName };
                    playerManager.resetPhase();

                    const useNativeLoop = state.player.loop && !state.player.pauseBefore && !state.player.pauseAfter;
                    const trackEntry = this.playAnimation(skeletonName, animationName, useNativeLoop);
                    uiControls.updateHighlighting();
                    uiControls.updateInfoOverlay();

                    if (trackEntry) {
                        if (state.player.pauseBefore) {
                            playerManager.startPauseBefore();
                        }

                        if (!useNativeLoop) {
                            trackEntry.listener = {
                                complete: () => {
                                    if (state.activeMode === 'animation' && state.activeAnimation &&
                                        state.activeAnimation.skeletonName === skeletonName &&
                                        state.activeAnimation.animationName === animationName) {

                                        const handleEnd = () => {
                                            if (state.player.loop) {
                                                const t = state.currentSkeleton.state.setAnimation(0, animationName, false);
                                                if (t) {
                                                    t.listener = trackEntry.listener;
                                                    if (state.player.pauseBefore) {
                                                        playerManager.startPauseBefore();
                                                    }
                                                }
                                            }
                                        };

                                        if (state.player.pauseAfter) {
                                            playerManager.startPauseAfter(handleEnd);
                                        } else {
                                            handleEnd();
                                        }
                                    }
                                }
                            };
                        }
                    }
                },

                validatePlaylist(playlist) {
                    const errors = [];
                    const seen = new Set();
                    playlist.forEach((item, idx) => {
                        const key = item.skeletonName + '|' + item.animationName;
                        if (seen.has(key)) return;
                        seen.add(key);
                        if (!state.loadedSkeletons.has(item.skeletonName)) {
                            errors.push('Line ' + (idx + 1) + ': skeleton "' + item.skeletonName + '" not loaded');
                        } else {
                            const anims = state.availableAnimations
                                .filter(a => a.skeletonName === item.skeletonName)
                                .map(a => a.animationName);
                            if (!anims.includes(item.animationName)) {
                                errors.push('Line ' + (idx + 1) + ': animation "' + item.animationName + '" not found in "' + item.skeletonName + '"');
                            }
                        }
                    });
                    return errors;
                },

                async onTextChange(text) {
                    state._lastScenarioText = text;
                    state.scenarioGeneration++;
                    if (state.currentSkeleton) {
                        state.currentSkeleton.state.clearTracks();
                    }

                    state.playlist = this.parse(text);
                    const errors = this.validatePlaylist(state.playlist);
                    if (errors.length > 0) {
                        showError(errors.join('\n'));
                        state.hasPlaylistError = true;
                    } else {
                        state.hasPlaylistError = false;
                        showZeroAlphaIfAny();
                    }

                    if (state.playlist.length > 0) {
                        state.player.playing = true;
                        playerManager.updatePlayPauseButton();
                        if (state.activeMode === 'scenario') {
                            await this.playAtIndex(0);
                        }
                    } else {
                        state.player.playing = false;
                        playerManager.updatePlayPauseButton();
                    }
                    playerManager.updateScenarioTimelineVisibility();
                },

                activateScenario() {
                    state.scenarioGeneration++;
                    state.activeMode = 'scenario';
                    state.activeAnimation = null;
                    playerManager.updateScenarioTimelineVisibility();
                    if (state.playlist.length > 0) {
                        state.player.playing = true;
                        playerManager.updatePlayPauseButton();
                        this.playAtIndex(0);
                    }
                    uiControls.updateHighlighting();
                }
            };

            const playerManager = {
                PAUSE_DURATION: 1.0,

                getAnimationDuration(skeletonName, animationName) {
                    const sk = state.skeletons[skeletonName];
                    if (!sk) return 0;
                    const data = sk.skeleton ? sk.skeleton.data : null;
                    if (!data || !data.animations) return 0;
                    for (let i = 0; i < data.animations.length; i++) {
                        if (data.animations[i].name === animationName) {
                            return data.animations[i].duration;
                        }
                    }
                    return 0;
                },

                getScenarioTotalDuration() {
                    let total = 0;
                    for (let i = 0; i < state.playlist.length; i++) {
                        total += this.getItemEffectiveDuration(state.playlist[i]);
                    }
                    return total;
                },

                getItemEffectiveDuration(item) {
                    let dur = this.getAnimationDuration(item.skeletonName, item.animationName);
                    if (state.player.pauseBefore) dur += this.PAUSE_DURATION;
                    if (state.player.pauseAfter) dur += this.PAUSE_DURATION;
                    return dur;
                },

                play() {
                    state.player.playing = true;
                    this.updatePlayPauseButton();
                    if (state.currentSkeleton && state.player.phase === 'none') {
                        state.currentSkeleton.state.timeScale = 1;
                    }
                    state.player.lastTickTime = performance.now();
                },

                pause() {
                    state.player.playing = false;
                    this.updatePlayPauseButton();
                    if (state.currentSkeleton) {
                        state.currentSkeleton.state.timeScale = 0;
                    }
                },

                togglePlay() {
                    if (state.player.playing) {
                        this.pause();
                    } else {
                        this.play();
                    }
                },

                toggleLoop() {
                    state.player.loop = !state.player.loop;
                    this.updateLoopButton();
                    if (state.activeMode === 'animation' && state.currentSkeleton) {
                        const track = state.currentSkeleton.state.getCurrent(0);
                        if (track) {
                            track.loop = state.player.loop && !state.player.pauseBefore && !state.player.pauseAfter;
                        }
                    }
                },

                togglePauseBefore() {
                    state.player.pauseBefore = !state.player.pauseBefore;
                    this.updatePauseBeforeButton();
                    this.updateScenarioTimelineVisibility();
                },

                togglePauseAfter() {
                    state.player.pauseAfter = !state.player.pauseAfter;
                    this.updatePauseAfterButton();
                    this.updateScenarioTimelineVisibility();
                },

                updatePlayPauseButton() {
                    const btn = document.getElementById('playPauseBtn');
                    if (state.player.playing) {
                        btn.title = 'Pause';
                        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>';
                    } else {
                        btn.title = 'Play';
                        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>';
                    }
                },

                updateLoopButton() {
                    const btn = document.getElementById('loopBtn');
                    if (state.player.loop) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                },

                updatePauseBeforeButton() {
                    const btn = document.getElementById('pauseBeforeBtn');
                    if (state.player.pauseBefore) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                },

                updatePauseAfterButton() {
                    const btn = document.getElementById('pauseAfterBtn');
                    if (state.player.pauseAfter) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                },

                updateScenarioTimelineVisibility() {
                    const timeline = document.getElementById('scenarioTimeline');
                    const wasVisible = timeline.classList.contains('visible');
                    const shouldBeVisible = state.activeMode === 'scenario';
                    if (wasVisible !== shouldBeVisible) {
                        if (shouldBeVisible) {
                            timeline.classList.add('visible');
                        } else {
                            timeline.classList.remove('visible');
                        }
                        this.resizeCanvas();
                    }
                },

                resizeCanvas() {
                    if (state.app) {
                        const container = document.querySelector('.canvas-container');
                        if (container && state.app.screen.width > 0 && state.app.screen.height > 0) {
                            state.app.renderer.resize(container.clientWidth, container.clientHeight);
                            
                            if (state.activeMode === 'museum') {
                                museumManager.drawWorkspace();
                                museumManager.updateAllSkeletonPositions();
                            } else {
                                const relX = state.cameraX / state.app.screen.width;
                                const relY = state.cameraY / state.app.screen.height;
                                skeletonManager.updatePosition(
                                    state.app.screen.width * relX,
                                    state.app.screen.height * relY
                                );
                                graphicsManager.drawRedLine();
                            }
                        }
                    }
                },

                startSeeking(type) {
                    state.player._wasPlayingBeforeSeek = state.player.playing;
                    state.player.seeking = true;
                    state.player.seekType = type;
                    this.pause();
                },

                endSeeking() {
                    state.player.seeking = false;
                    state.player.seekType = null;
                    if (state.player._wasPlayingBeforeSeek) {
                        this.play();
                    }
                },

                seekPosition(ratio) {
                    if (!state.currentSkeleton) return;
                    const track = state.currentSkeleton.state.getCurrent(0);
                    if (!track || !track.animation) return;
                    const duration = track.animation.duration;
                    if (duration <= 0) return;
                    track.trackTime = ratio * duration;
                },

                seekScenario(ratio) {
                    const totalDuration = this.getScenarioTotalDuration();
                    if (totalDuration <= 0) return;
                    const targetTime = ratio * totalDuration;

                    let elapsed = 0;
                    for (let i = 0; i < state.playlist.length; i++) {
                        const item = state.playlist[i];
                        const itemDur = this.getAnimationDuration(item.skeletonName, item.animationName);
                        const pb = state.player.pauseBefore ? this.PAUSE_DURATION : 0;
                        const pa = state.player.pauseAfter ? this.PAUSE_DURATION : 0;
                        const effective = pb + itemDur + pa;

                        if (i === state.playlist.length - 1 || elapsed + effective > targetTime) {
                            const itemOffset = targetTime - elapsed;

                            state.scenarioGeneration++;
                            state.currentIndex = i;
                            this.resetPhase();
                            uiControls.updateHighlighting();

                            const resolution = getEffectiveResolution(item.skeletonName, item.animationName);
                            skeletonManager.switchTo(item.skeletonName, resolution);
                            const gen = state.scenarioGeneration;
                            const track = state.currentSkeleton.state.setAnimation(0, item.animationName, false);

                            uiControls.updateInfoOverlay();

                            if (track) {
                                if (itemDur <= 0) {
                                    track.trackTime = 0;
                                } else if (itemOffset < pb) {
                                    track.trackTime = 0;
                                } else if (itemOffset < pb + itemDur) {
                                    track.trackTime = itemOffset - pb;
                                } else {
                                    track.trackTime = itemDur;
                                }

                                if (track.animation && track.animation.duration > 0) {
                                    document.getElementById('positionSlider').value = Math.min((track.trackTime / track.animation.duration) * 1000, 1000);
                                }

                                track.listener = {
                                    complete: () => {
                                        if (state.scenarioGeneration === gen && state.activeMode === 'scenario') {
                                            if (state.player.pauseAfter) {
                                                playerManager.startPauseAfter(() => {
                                                    playlistManager.playAtIndex(i + 1);
                                                });
                                            } else {
                                                playlistManager.playAtIndex(i + 1);
                                            }
                                        }
                                    }
                                };
                            }
                            return;
                        }
                        elapsed += effective;
                    }
                },

                resetPhase() {
                    state.player.phase = 'none';
                    state.player.phaseElapsed = 0;
                    state.player.pendingAction = null;
                    state.player.stallIndex = -1;
                    state.player.stallSince = 0;
                },

                startPauseBefore() {
                    state.player.phase = 'pauseBefore';
                    state.player.phaseElapsed = 0;
                    if (state.currentSkeleton) {
                        const track = state.currentSkeleton.state.getCurrent(0);
                        if (track) track.trackTime = 0;
                        state.currentSkeleton.state.timeScale = 0;
                    }
                },

                startPauseAfter(callback) {
                    state.player.phase = 'pauseAfter';
                    state.player.phaseElapsed = 0;
                    state.player.pendingAction = callback;
                    if (state.currentSkeleton) {
                        state.currentSkeleton.state.timeScale = 0;
                    }
                },

                onTick() {
                    const now = performance.now();
                    const delta = (now - state.player.lastTickTime) / 1000;
                    state.player.lastTickTime = now;

                    if (state.activeMode === 'museum') {
                        museumManager.updateSelectedPositionSlider();
                        return;
                    }

                    if (!state.currentSkeleton) return;

                    if (state.player.phase === 'pauseBefore') {
                        if (state.player.playing) {
                            state.player.phaseElapsed += delta;
                        }
                        if (state.player.phaseElapsed >= this.PAUSE_DURATION) {
                            state.player.phase = 'none';
                            if (state.player.playing) {
                                state.currentSkeleton.state.timeScale = 1;
                            }
                        }
                        document.getElementById('positionSlider').value = 0;
                        if (state.activeMode === 'scenario') this.updateScenarioSliderPosition();
                        return;
                    }

                    if (state.player.phase === 'pauseAfter') {
                        if (state.player.playing) {
                            state.player.phaseElapsed += delta;
                        }
                        if (state.player.phaseElapsed >= this.PAUSE_DURATION) {
                            state.player.phase = 'none';
                            if (state.player.pendingAction) {
                                const action = state.player.pendingAction;
                                state.player.pendingAction = null;
                                action();
                                return;
                            }
                        }
                        const track = state.currentSkeleton.state.getCurrent(0);
                        if (track && track.animation && track.animation.duration > 0) {
                            document.getElementById('positionSlider').value = 1000;
                        }
                        if (state.activeMode === 'scenario') this.updateScenarioSliderPosition();
                        return;
                    }

                    if (state.player.seeking) return;

                    const track = state.currentSkeleton.state.getCurrent(0);
                    if (!track || !track.animation) return;

                    const duration = track.animation.duration;
                    if (duration > 0) {
                        let ratio;
                        if (track.loop) {
                            ratio = (track.trackTime % duration) / duration;
                        } else {
                            ratio = Math.min(track.trackTime / duration, 1);
                        }
                        document.getElementById('positionSlider').value = ratio * 1000;
                    } else {
                        document.getElementById('positionSlider').value = 0;
                    }

                    if (state.activeMode === 'scenario' && state.playlist.length > 0) {
                        this.updateScenarioSliderPosition();
                    }

                    if (state.activeMode === 'scenario' && state.playlist.length > 0 &&
                        state.player.playing && !state.player.seeking &&
                        !track.loop && duration > 0) {
                        if (track.trackTime >= duration) {
                            if (state.player.stallIndex !== state.currentIndex) {
                                state.player.stallIndex = state.currentIndex;
                                state.player.stallSince = now;
                            } else if (now - state.player.stallSince > 1500) {
                                const item = state.playlist[state.currentIndex];
                                const animName = item ? item.animationName : '';
                                const skName = item ? item.skeletonName : '';
                                showError('Animation "' + animName + '" of "' + skName + '" did not complete; auto-advancing.');
                                state.player.stallIndex = -1;
                                state.player.stallSince = 0;
                                playlistManager.playAtIndex(state.currentIndex + 1);
                                return;
                            }
                        } else {
                            state.player.stallIndex = -1;
                            state.player.stallSince = 0;
                        }
                    }
                },

                updateScenarioSliderPosition() {
                    let elapsed = 0;

                    for (let i = 0; i < state.currentIndex; i++) {
                        elapsed += this.getItemEffectiveDuration(state.playlist[i]);
                    }

                    const currentItem = state.playlist[state.currentIndex];
                    if (!currentItem) return;

                    const itemDur = this.getAnimationDuration(currentItem.skeletonName, currentItem.animationName);
                    const pb = state.player.pauseBefore ? this.PAUSE_DURATION : 0;

                    if (state.player.phase === 'pauseBefore') {
                        elapsed += Math.min(state.player.phaseElapsed, this.PAUSE_DURATION);
                    } else if (state.player.phase === 'pauseAfter') {
                        elapsed += pb + itemDur + Math.min(state.player.phaseElapsed, this.PAUSE_DURATION);
                    } else {
                        elapsed += pb;
                        const track = state.currentSkeleton ? state.currentSkeleton.state.getCurrent(0) : null;
                        if (track && track.animation && track.animation.duration > 0) {
                            elapsed += Math.min(track.trackTime, track.animation.duration);
                        }
                    }

                    const totalDuration = this.getScenarioTotalDuration();
                    if (totalDuration > 0) {
                        document.getElementById('scenarioSlider').value = Math.min((elapsed / totalDuration) * 1000, 1000);
                    }
                },

                init() {
                    document.getElementById('playPauseBtn').addEventListener('click', () => this.togglePlay());
                    document.getElementById('loopBtn').addEventListener('click', () => this.toggleLoop());
                    document.getElementById('pauseBeforeBtn').addEventListener('click', () => this.togglePauseBefore());
